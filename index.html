<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>歴史一問一答</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="歴史クイズ">
<meta name="theme-color" content="#fffaf5">
<style>
:root {
  --bg:#fffaf4; --paper:#fffdf9; --card:#ffffff; --text:#232833; --muted:#8b919d;
  --accent:#d32f50; --accent2:#ff7a35; --soft:#fff2ea; --ok:#18a76b; --ng:#7a828e;
  --line:rgba(36,40,48,.10); --shadow:0 18px 52px rgba(94,65,34,.10);
}
* { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { margin:0; width:100%; height:100%; overflow:hidden; font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',Meiryo,sans-serif; color:var(--text); background:linear-gradient(135deg,#fffdf9 0%,#fff5ec 52%,#ffffff 100%); }
body { user-select:none; }
.app { width:100vw; height:100dvh; padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); display:flex; align-items:center; justify-content:center; }
.wrap { width:min(1280px,100vw); height:min(620px,calc(100dvh - 10px)); padding:14px 14px 10px; display:grid; grid-template-rows:34px minmax(0,1fr) 22px; gap:8px; }
.top { display:grid; grid-template-columns:36px 1fr auto auto; gap:12px; align-items:center; position:relative; z-index:30; }
.brand { display:flex; align-items:center; gap:9px; font-weight:900; letter-spacing:.035em; font-size:17px; color:#252a34; }
.badge { width:29px; height:29px; border-radius:10px; display:grid; place-items:center; background:linear-gradient(135deg,var(--accent),var(--accent2)); color:white; box-shadow:0 8px 18px rgba(211,47,80,.19); font-size:15px; }
.counter { font-size:22px; font-weight:950; letter-spacing:.085em; color:var(--accent); min-width:145px; text-align:right; }
.iconbtn { border:1px solid var(--line); background:rgba(255,255,255,.92); color:var(--text); border-radius:999px; height:34px; min-width:34px; padding:0 12px; font-size:12px; font-weight:850; box-shadow:0 5px 14px rgba(0,0,0,.035); position:relative; z-index:40; pointer-events:auto; touch-action:manipulation; }
.main { display:grid; grid-template-columns:minmax(0,1fr) 112px; gap:8px; min-height:0; }
.card { background:rgba(255,255,255,.90); border:1px solid var(--line); border-radius:28px; box-shadow:var(--shadow); overflow:hidden; position:relative; }
.study { padding:0 clamp(44px,6.4vw,96px); display:block; text-align:center; position:relative; z-index:1; }
.label { position:absolute; top:22px; left:0; right:0; color:var(--accent); font-weight:950; letter-spacing:.24em; font-size:25px; line-height:1; margin:0; height:30px; z-index:2; }
.mainText { position:absolute; inset:0; width:100%; height:100%; font-weight:950; letter-spacing:.01em; line-height:1.62; text-wrap:balance; overflow:hidden; display:flex; align-items:center; justify-content:center; white-space:normal; word-break:keep-all; overflow-wrap:normal; max-height:none; padding:48px clamp(44px,6.4vw,96px) 44px; }
.questionText { font-size:43px; }
.answerText { font-size:68px; line-height:1.38; }
.sub { display:none; }
.speaker { display:none; }
.hint { position:absolute; left:0; right:0; bottom:18px; color:var(--muted); font-weight:850; font-size:12px; min-height:16px; margin:0; z-index:2; }
.rail { padding:9px 9px; display:flex; flex-direction:column; gap:7px; align-items:stretch; justify-content:center; background:rgba(255,255,255,.72); position:relative; z-index:20; pointer-events:auto; }
.action { border:0; border-radius:19px; background:linear-gradient(135deg,var(--accent),var(--accent2)); color:white; font-weight:950; min-height:78px; font-size:15px; box-shadow:0 10px 24px rgba(211,47,80,.16); writing-mode:vertical-rl; letter-spacing:.18em; margin:auto; width:84px; position:relative; z-index:25; pointer-events:auto; touch-action:manipulation; }
.gradeBtn { border:1px solid var(--line); border-radius:18px; background:white; min-height:74px; width:100%; font-weight:950; font-size:12px; color:var(--text); box-shadow:0 7px 18px rgba(0,0,0,.040); position:relative; z-index:25; pointer-events:auto; touch-action:manipulation; }
.gradeBtn .mark { display:block; font-size:30px; line-height:1; margin-bottom:3px; }
.gradeBtn.ok .mark { color:var(--ok); } .gradeBtn.ng .mark { color:var(--ng); }
.microStats { color:var(--muted); font-weight:850; font-size:9.5px; line-height:1.45; text-align:center; margin-top:0; }
.bottom { display:grid; grid-template-columns:1fr auto; align-items:center; gap:12px; }
.progress { height:8px; background:rgba(32,36,44,.075); border-radius:999px; overflow:hidden; }
.fill { height:100%; width:0%; background:linear-gradient(90deg,var(--accent),var(--accent2)); border-radius:999px; transition:.25s; }
.mode { display:flex; gap:6px; }
.pill { border:1px solid var(--line); border-radius:999px; background:rgba(255,255,255,.78); padding:7px 11px; font-weight:950; font-size:11px; color:var(--muted); }
.pill.active { color:white; background:linear-gradient(135deg,var(--accent),var(--accent2)); border-color:transparent; }
.menu { position:fixed; inset:0; display:none; align-items:center; justify-content:center; background:rgba(255,250,245,.82); backdrop-filter:blur(16px); z-index:1000; }
.menu.show { display:flex; }
.menuPanel { width:min(420px,86vw); border-radius:28px; background:white; box-shadow:0 20px 70px rgba(0,0,0,.13); padding:22px; }
.menuPanel h2 { margin:0 0 14px; font-size:24px; }
.menuItem { width:100%; border:1px solid var(--line); border-radius:18px; background:#fff; padding:16px; margin:7px 0; font-size:16px; font-weight:900; text-align:left; }
.toast { position:fixed; left:50%; bottom:18px; transform:translateX(-50%); padding:10px 16px; border-radius:999px; color:white; background:rgba(30,34,42,.86); display:none; font-weight:850; z-index:20; }
@media (max-height:430px) {
  .wrap { height:min(370px,calc(100dvh - 8px)); padding:12px 12px 8px; grid-template-rows:30px minmax(0,1fr) 20px; gap:6px; }
  .top { grid-template-columns:32px 1fr auto auto; }
  .brand { font-size:15px; }
  .badge { width:25px; height:25px; font-size:13px; }
  .counter { font-size:19px; min-width:130px; }
  .iconbtn { height:29px; min-width:29px; padding:0 9px; }
  .main { grid-template-columns:minmax(0,1fr) 102px; gap:7px; }
  .study { padding:0 clamp(34px,5.8vw,80px); }
  .label { top:19px; font-size:21px; height:26px; margin:0; }
  .mainText { line-height:1.62; padding:44px clamp(34px,5.8vw,80px) 38px; }
  .sub,.speaker { display:none; }
  .hint { bottom:15px; font-size:10px; min-height:12px; margin:0; }
  .action { min-height:64px; width:78px; font-size:13px; }
  .gradeBtn { min-height:62px; font-size:10px; }
  .gradeBtn .mark { font-size:25px; }
  .progress { height:6px; }
  .pill { padding:5px 9px; font-size:10px; }
}
.portrait { display:none; }
@media (orientation:portrait) {
  html,body { background:linear-gradient(135deg,#fffdf9 0%,#fff5ec 58%,#ffffff 100%); }
  .app { display:none; }
  .portrait {
    position:fixed;
    inset:0;
    z-index:999;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:34px;
    text-align:center;
    color:var(--text);
    background:linear-gradient(135deg,#fffdf9 0%,#fff5ec 58%,#ffffff 100%);
    font-weight:950;
    letter-spacing:.04em;
    font-size:28px;
    line-height:1.45;
  }
  .portrait:before {
    content:'↻';
    display:grid;
    place-items:center;
    width:76px;
    height:76px;
    border-radius:26px;
    margin-bottom:22px;
    color:white;
    font-size:42px;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    box-shadow:0 18px 44px rgba(211,47,80,.18);
  }
}
</style>
</head>
<body>
<div class="portrait">iPhoneを横向きにしてください<br><span style="font-size:15px;color:#8a909a">横表示で文字が見やすくなります</span></div>
<div class="app">
  <div class="wrap">
    <div class="top">
      <button type="button" class="iconbtn" onclick="event.stopPropagation();toggleMenu()">☰</button>
      <div class="brand"><span class="badge">歴</span><span>歴史一問一答</span></div>
      <div class="counter"><span id="qid"></span> / <span id="total"></span></div>
      <button type="button" class="iconbtn" onclick="event.stopPropagation();toggleSound()" id="soundBtn">♪ OFF</button>
    </div>
    <div class="main">
      <section class="card study" onclick="tapMain()">
        <div class="label" id="label">問題</div>
        <div id="mainText" class="mainText questionText"></div>
        <div class="sub" id="subText"></div>
        <div class="speaker" id="speaker"></div>
        <div class="hint" id="hint">タップで答えを表示</div>
      </section>
      <aside class="card rail" id="side">
        <button type="button" class="action" id="showAnswerBtn" onclick="showAnswer(event)">答え</button>
        <button type="button" class="gradeBtn ok" id="okBtn" onclick="grade(true,event)" style="display:none"><span class="mark">○</span>正解</button>
        <button type="button" class="gradeBtn ng" id="ngBtn" onclick="grade(false,event)" style="display:none"><span class="mark">×</span>不正解</button>
        <div class="microStats" id="stats"></div>
      </aside>
    </div>
    <div class="bottom">
      <div class="progress"><div class="fill" id="fill"></div></div>
      <div class="mode"><button class="pill active" onclick="setMode('normal')" id="mNormal">通常</button><button class="pill" onclick="setMode('wrong')" id="mWrong">苦手</button><button class="pill" onclick="setMode('random')" id="mRandom">ランダム</button></div>
    </div>
  </div>
</div>
<div class="menu" id="menu" onclick="toggleMenu(false)"><div class="menuPanel" onclick="event.stopPropagation()"><h2>メニュー</h2><button class="menuItem" onclick="restart()">▶ 最初から始める</button><button class="menuItem" onclick="setMode('wrong');toggleMenu(false)">◎ 間違えた問題だけ</button><button class="menuItem" onclick="setMode('random');toggleMenu(false)">↝ ランダム出題</button><button class="menuItem" onclick="resetStats()">記録をリセット</button><button class="menuItem" onclick="toggleMenu(false)">閉じる</button></div></div>
<div class="toast" id="toast"></div>
<script>
const QUESTIONS = [{"id": "506", "question": "黒船を率いて、1853年に浦賀へ来航し、開国をせまったアメリカ人はだれですか。", "answer": "ペリー"}, {"id": "507", "question": "ペリーと江戸幕府の間で、1854年に結ばれた条約を何といいますか。", "answer": "日米和親条約"}, {"id": "508", "question": "日米和親条約によって開かれた港を2つ答えなさい。", "answer": "下田・函館"}, {"id": "509", "question": "アメリカが、日本に開国を迫った理由を二つ挙げなさい", "answer": "捕鯨のための基地を得ること。中国との貿易の中継地とするため。"}, {"id": "510", "question": "日本とアメリカの間で貿易が始まることになった、1858年に結ばれた条約を何といいますか。", "answer": "日米修好通商条約"}, {"id": "511", "question": "日米修好通商条約が、日本にとって不利な条約とされたのはなぜですか。", "answer": "領事裁判権（治外法権）を認めていたから"}, {"id": "512", "question": "日米修好通商条約が、日本にとって不平等な条約と言われたもう一つの理由は何ですか。", "answer": "関税自主権がなかったこと"}, {"id": "513", "question": "日米修好通商条約によって開港した港を5つ答えなさい。", "answer": "函館・横浜・新潟・神戸・長崎"}, {"id": "514", "question": "江戸時代の終わりごろ、日本最大の貿易額をあげていた港はどこですか。", "answer": "横浜"}, {"id": "515", "question": "江戸時代末期の日本の主な輸出品を2つ答えなさい。", "answer": "生糸・茶"}, {"id": "516", "question": "日米修好通商条約締結後、外国人を追放しようとする運動を何といいますか。", "answer": "攘夷運動"}, {"id": "517", "question": "攘夷運動が起こったきっかけは何ですか？", "answer": "国内の品不足による物価上昇"}, {"id": "518", "question": "攘夷運動と、天皇中心の国を理想とする尊王思想が結びついた運動を何といいますか。", "answer": "尊王攘夷運動"}, {"id": "519", "question": "彦根藩出身で、朝廷の許可を得ずに日米修好通商条約を結んだ大老はだれですか。", "answer": "井伊直弼"}, {"id": "520", "question": "井伊直弼が1858年から行った、条約反対派を処罰する政策を何といいますか。", "answer": "安政のたい獄"}, {"id": "521", "question": "安政の大獄で処刑された、松下村塾を開いていた長州藩出身の人物はだれですか。", "answer": "吉田松陰"}, {"id": "522", "question": "井伊直弼が暗殺された、1860年の事件を何といいますか。", "answer": "桜田門外の変"}, {"id": "523", "question": "江戸時代末に、倒幕運動の中心となった九州地方の藩はどこですか。", "answer": "薩摩藩"}, {"id": "524", "question": "江戸時代末に、倒幕運動の中心となった中国地方の藩はどこですか。", "answer": "長州藩"}, {"id": "525", "question": "長州藩で奇兵隊を組織し、藩の改革を進めた人物はだれですか。", "answer": "高杉晋作"}, {"id": "526", "question": "現在の横浜市付近で、薩摩藩士がイギリス人を殺傷し、その後の対立のきっかけとなった事件を何といいますか。", "answer": "生麦事件"}, {"id": "527", "question": "生麦事件 をきっかけに、1863年にイギリス と 薩摩藩 の間で起こった戦争を何といいますか。", "answer": "薩英戦争"}, {"id": "528", "question": "薩摩藩と長州藩の間で結ばれた、1866年の同盟を何といいますか。", "answer": "薩長同盟"}, {"id": "529", "question": "薩長同盟の成立に力を尽くした土佐藩出身の人物はだれですか。", "answer": "坂本龍馬"}, {"id": "530", "question": "坂本龍馬の師にあたり、幕府の海軍で活躍した人物はだれですか。", "answer": "勝海舟"}, {"id": "531", "question": "江戸幕府の15代将軍はだれですか。", "answer": "徳川慶喜"}, {"id": "532", "question": "徳川慶喜が1867年に政権を朝廷へ返上したことを何といいますか。", "answer": "大政奉還"}];
let order = QUESTIONS.map((_,i)=>i), pos=0, state='q', sound=false, mode='normal';
const KEY='history_quiz_stats_v3';
let stats = JSON.parse(localStorage.getItem(KEY)||'{}');
function $(id){return document.getElementById(id)}
function save(){localStorage.setItem(KEY, JSON.stringify(stats));}
function current(){return QUESTIONS[order[pos]];}
function shuffle(a){for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function naturalBreak(s){
  // 句読点の直後だけ折り返し候補を作る。単語の途中では極力切らない。
  return String(s)
    .replace(/、/g,'、&#8203;')
    .replace(/。/g,'。&#8203;')
    .replace(/\?/g,'?&#8203;')
    .replace(/？/g,'？&#8203;')
    .replace(/（/g,'&#8203;（')
    .replace(/・/g,'・&#8203;');
}
function speak(txt){ speechSynthesis.cancel(); if(!sound){$('speaker').textContent='';return;} const u=new SpeechSynthesisUtterance(txt); u.lang='ja-JP'; u.rate=1.03; u.pitch=1; $('speaker').textContent='読み上げ中...'; u.onend=()=>{$('speaker').textContent='';}; speechSynthesis.speak(u); }
function fitText(){
  const el=$('mainText');
  const q=current();
  const text = state==='a' ? q.answer : q.question;
  const len = [...text].length;
  const parent = el.parentElement;
  // 本文エリアはCSSグリッドで固定。毎回同じ天地センターに置く。
  const availableH = el.clientHeight || (parent.clientHeight - $('label').offsetHeight - $('hint').offsetHeight - 42);
  el.style.maxHeight = Math.max(120, availableH) + 'px';

  if(state==='a'){
    const cardW = el.clientWidth || parent.clientWidth;
    let max = Math.min(82, Math.max(42, cardW / Math.max(4, len) * 1.15));
    let min = 28;
    binaryFit(el, min, max);
    return;
  }

  const cardW = el.clientWidth || parent.clientWidth;
  // 文字数から目標行数を決める。短文は2行、通常は3行、長文だけ4行。
  const targetLines = len <= 34 ? 2 : len <= 62 ? 3 : 4;
  const charsPerLine = Math.ceil(len / targetLines);
  // 日本語の実測に近い係数。横幅を活かして、改行を増やさず、行間はゆったり。
  let predicted = cardW / Math.max(9, charsPerLine) * 0.94;
  let max = Math.min(52, Math.max(30, predicted));
  let min = len > 72 ? 24 : 27;
  binaryFit(el, min, max);
}
function binaryFit(el, min, max){
  let lo=min, hi=max, best=min;
  for(let i=0;i<16;i++){
    const mid=(lo+hi)/2;
    el.style.fontSize=mid+'px';
    // Safariで反映を安定させるためscroll値を見る
    if(el.scrollHeight <= el.clientHeight + 1 && el.scrollWidth <= el.clientWidth + 1){ best=mid; lo=mid; }
    else { hi=mid; }
  }
  el.style.fontSize=Math.floor(best*10)/10+'px';
}
function render(){ const q=current(); $('qid').textContent=q.id; $('total').textContent=String(QUESTIONS.length).padStart(4,'0'); $('fill').style.width=((pos+1)/order.length*100)+'%';
 const st=stats[q.id]||{ok:0,ng:0}; $('stats').innerHTML=`正${st.ok} / 誤${st.ng}<br>${pos+1}/${order.length}`;
 if(state==='q'){ $('label').textContent='問題'; $('mainText').className='mainText questionText'; $('mainText').innerHTML=naturalBreak(q.question); $('subText').textContent=''; $('hint').textContent='タップで答えを表示'; $('showAnswerBtn').style.display='block'; $('okBtn').style.display='none'; $('ngBtn').style.display='none'; setTimeout(fitText,0); speak(q.question); }
 else { $('label').textContent='答え'; $('mainText').className='mainText answerText'; $('mainText').innerHTML=naturalBreak(q.answer); $('subText').textContent = ''; $('hint').textContent='正解 / 不正解を選んで次へ'; $('showAnswerBtn').style.display='none'; $('okBtn').style.display='block'; $('ngBtn').style.display='block'; setTimeout(fitText,0); speak(q.answer); }
}
function tapMain(){ if(state==='q') showAnswer(); }
function showAnswer(e){ if(e) e.stopPropagation(); state='a'; render(); }
function grade(ok,e){ if(e) e.stopPropagation(); const q=current(); stats[q.id]=stats[q.id]||{ok:0,ng:0}; if(ok) stats[q.id].ok++; else stats[q.id].ng++; save(); toast(ok?'正解！':'次は正解できる！'); next(); }
function next(){ pos++; if(pos>=order.length) pos=0; state='q'; render(); }
function setMode(m){ mode=m; document.querySelectorAll('.pill').forEach(x=>x.classList.remove('active')); if(m==='normal'){order=QUESTIONS.map((_,i)=>i);$('mNormal').classList.add('active');} if(m==='random'){order=shuffle(QUESTIONS.map((_,i)=>i));$('mRandom').classList.add('active');} if(m==='wrong'){order=QUESTIONS.map((q,i)=>({q,i})).filter(x=>(stats[x.q.id]?.ng||0)>0).map(x=>x.i); if(!order.length){toast('まだ間違えた問題がありません'); order=QUESTIONS.map((_,i)=>i); $('mNormal').classList.add('active');} else $('mWrong').classList.add('active');} pos=0; state='q'; render();}
function toggleSound(){ sound=!sound; $('soundBtn').textContent=sound?'♪ ON':'♪ OFF'; if(!sound) speechSynthesis.cancel(); else render(); }
function toggleMenu(force){ const m=$('menu'); m.classList.toggle('show', force===undefined?!m.classList.contains('show'):force); }
function restart(){ pos=0; state='q'; toggleMenu(false); render(); }
function resetStats(){ if(confirm('記録をリセットしますか？')){stats={};save();render();toggleMenu(false);} }
function toast(t){ const el=$('toast'); el.textContent=t; el.style.display='block'; clearTimeout(window._to); window._to=setTimeout(()=>el.style.display='none',900); }
window.addEventListener('resize',()=>setTimeout(fitText,80));
render();
</script>
</body>
</html>
