<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>江戸時代｜歴史一問一答</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="歴史クイズ">
<meta name="theme-color" content="#fffaf5">
<style>
:root {
  --bg:#fffaf5; --card:#ffffff; --text:#222733; --muted:#8c929d;
  --accent:#d32f50; --accent2:#ff7834; --line:rgba(42,46,55,.105);
  --shadow:0 18px 42px rgba(110,80,50,.085); --ok:#17a66a; --ng:#89909a;
}
* { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { margin:0; width:100%; height:100%; overflow:hidden; font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',Meiryo,sans-serif; color:var(--text); background:linear-gradient(135deg,#fffdf9 0%,#fff6ef 54%,#ffffff 100%); }
body { user-select:none; }
button { font-family:inherit; cursor:pointer; }
.app { width:100vw; height:100dvh; padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); display:flex; align-items:center; justify-content:center; }
.wrap { width:min(1320px,100vw); height:min(610px,calc(100dvh - 8px)); padding:18px 20px 12px; display:grid; grid-template-rows:36px minmax(0,1fr) 22px; gap:9px; }
.top { display:grid; grid-template-columns:36px auto 1fr auto; gap:12px; align-items:center; position:relative; z-index:40; min-height:36px; }
.brand { display:flex; align-items:center; gap:9px; font-weight:950; letter-spacing:.035em; font-size:17px; color:#252a34; white-space:nowrap; }
.badge { width:29px; height:29px; border-radius:10px; display:grid; place-items:center; background:linear-gradient(135deg,var(--accent),var(--accent2)); color:white; box-shadow:0 8px 18px rgba(211,47,80,.16); font-size:15px; }
.meta { display:flex; justify-content:flex-end; align-items:center; gap:12px; min-width:0; color:var(--accent); font-weight:950; letter-spacing:.045em; white-space:nowrap; }
.meta .era { color:#59606b; font-size:14px; font-weight:900; letter-spacing:.08em; }
.meta .no { font-size:18px; }
.meta .progressText { font-size:18px; }
.iconbtn { border:1px solid var(--line); background:rgba(255,255,255,.92); color:var(--text); border-radius:999px; height:34px; min-width:34px; padding:0 12px; font-size:12px; font-weight:900; box-shadow:0 5px 14px rgba(0,0,0,.035); position:relative; z-index:50; pointer-events:auto; touch-action:manipulation; }
.main { display:grid; grid-template-columns:minmax(0,1fr) 162px; gap:10px; min-height:0; }
.card { background:rgba(255,255,255,.90); border:1px solid var(--line); border-radius:28px; box-shadow:var(--shadow); overflow:hidden; position:relative; }
.study { display:grid; grid-template-rows:58px minmax(0,1fr) 34px; padding:0 clamp(34px,4.6vw,70px); text-align:center; position:relative; z-index:1; }
.label { grid-row:1; align-self:end; justify-self:center; color:var(--accent); font-weight:950; letter-spacing:.26em; font-size:30px; line-height:1; margin:0; padding-left:.26em; }
.textBox { grid-row:2; min-height:0; display:flex; align-items:center; justify-content:center; padding:2px 0 0; }
.mainText { width:100%; max-height:100%; font-weight:950; letter-spacing:.005em; line-height:1.54; text-align:center; overflow:hidden; white-space:normal; word-break:keep-all; overflow-wrap:normal; line-break:strict; text-wrap:balance; }
.mainText .line { display:block; white-space:nowrap; }
.questionText { font-size:42px; }
.answerText { font-size:72px; line-height:1.30; }
.hint { grid-row:3; align-self:center; color:var(--muted); font-weight:850; font-size:11px; margin:0; }
.rail { padding:12px 12px; display:grid; grid-template-rows:1fr auto; gap:8px; background:rgba(255,255,255,.76); z-index:20; pointer-events:auto; }
.actionWrap { min-height:0; display:flex; align-items:center; justify-content:center; }
.action { border:0; border-radius:23px; background:linear-gradient(135deg,var(--accent),var(--accent2)); color:white; font-weight:950; min-height:106px; width:100%; padding:0 10px; font-size:20px; line-height:1.2; box-shadow:0 11px 23px rgba(211,47,80,.16); position:relative; z-index:25; pointer-events:auto; touch-action:manipulation; display:grid; place-items:center; letter-spacing:.05em; }
.gradeGroup { min-height:0; display:none; align-content:center; gap:10px; }
.gradeBtn { border:1px solid var(--line); border-radius:20px; background:white; min-height:74px; width:100%; font-weight:950; font-size:13px; color:var(--text); box-shadow:0 7px 18px rgba(0,0,0,.040); position:relative; z-index:25; pointer-events:auto; touch-action:manipulation; }
.gradeBtn .mark { display:block; font-size:32px; line-height:1; margin-bottom:2px; }
.gradeBtn.ok .mark { color:var(--ok); } .gradeBtn.ng .mark { color:var(--ng); }
.microStats { color:var(--muted); font-weight:850; font-size:10px; line-height:1.45; text-align:center; padding:0 0 2px; }
.bottom { display:grid; grid-template-columns:1fr auto; align-items:center; gap:12px; }
.progress { height:8px; background:rgba(32,36,44,.075); border-radius:999px; overflow:hidden; }
.fill { height:100%; width:0%; background:linear-gradient(90deg,var(--accent),var(--accent2)); border-radius:999px; transition:.25s; }
.mode { display:flex; gap:7px; }
.pill { border:1px solid var(--line); border-radius:999px; background:rgba(255,255,255,.78); padding:7px 12px; font-weight:950; font-size:11px; color:var(--muted); position:relative; z-index:30; }
.pill.active { color:white; background:linear-gradient(135deg,var(--accent),var(--accent2)); border-color:transparent; }
.menu { position:fixed; inset:0; display:none; align-items:center; justify-content:center; background:rgba(255,250,245,.82); backdrop-filter:blur(16px); z-index:1000; }
.menu.show { display:flex; }
.menuPanel { width:min(420px,86vw); border-radius:28px; background:white; box-shadow:0 20px 70px rgba(0,0,0,.13); padding:22px; }
.menuPanel h2 { margin:0 0 14px; font-size:24px; }
.menuItem { width:100%; border:1px solid var(--line); border-radius:18px; background:#fff; padding:16px; margin:7px 0; font-size:16px; font-weight:900; text-align:left; }
.toast { position:fixed; left:50%; bottom:18px; transform:translateX(-50%); padding:10px 16px; border-radius:999px; color:white; background:rgba(30,34,42,.86); display:none; font-weight:850; z-index:2000; }
.portrait { display:none; }
@media (max-height:430px) {
  .wrap { height:min(370px,calc(100dvh - 8px)); padding:15px 18px 9px; grid-template-rows:31px minmax(0,1fr) 20px; gap:7px; }
  .top { grid-template-columns:32px auto 1fr auto; gap:10px; min-height:31px; }
  .brand { font-size:15px; } .badge { width:25px; height:25px; border-radius:9px; font-size:13px; }
  .meta { gap:9px; } .meta .era { font-size:12px; } .meta .no,.meta .progressText { font-size:16px; }
  .iconbtn { height:29px; min-width:29px; padding:0 9px; }
  .main { grid-template-columns:minmax(0,1fr) 150px; gap:8px; }
  .study { grid-template-rows:48px minmax(0,1fr) 28px; padding:0 clamp(28px,4.2vw,58px); }
  .label { font-size:26px; letter-spacing:.24em; padding-left:.24em; }
  .mainText { line-height:1.52; }
  .hint { font-size:10px; }
  .rail { padding:10px; }
  .action { min-height:88px; font-size:17px; border-radius:21px; }
  .gradeBtn { min-height:64px; font-size:11px; border-radius:18px; } .gradeBtn .mark { font-size:26px; }
  .microStats { font-size:9px; } .progress { height:6px; } .pill { padding:5px 9px; font-size:10px; }
}
@media (orientation:portrait) {
  .app { display:none; }
  .portrait { position:fixed; inset:0; z-index:999; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:34px; text-align:center; color:var(--text); background:linear-gradient(135deg,#fffdf9 0%,#fff5ec 58%,#ffffff 100%); font-weight:950; letter-spacing:.04em; font-size:28px; line-height:1.45; }
  .portrait:before { content:'↻'; display:grid; place-items:center; width:76px; height:76px; border-radius:26px; margin-bottom:22px; color:white; font-size:42px; background:linear-gradient(135deg,var(--accent),var(--accent2)); box-shadow:0 18px 44px rgba(211,47,80,.18); }
}
</style>
</head>
<body>
<div class="portrait">iPhoneを横向きにしてください<br><span style="font-size:15px;color:#8a909a">横表示で文字が見やすくなります</span></div>
<div class="app">
  <div class="wrap">
    <div class="top">
      <button type="button" class="iconbtn" onclick="event.stopPropagation();toggleMenu()">☰</button>
      <div class="brand"><span class="badge">歴</span><span>歴史一問一答</span></div>
      <div class="meta"><span class="era">江戸時代</span><span class="no">問題<span id="qid"></span></span><span class="progressText"><span id="posNow"></span>/<span id="total"></span></span></div>
      <button type="button" class="iconbtn" onclick="event.stopPropagation();toggleSound()" id="soundBtn">♪ OFF</button>
    </div>
    <div class="main">
      <section class="card study" onclick="tapMain()">
        <div class="label" id="label">問題</div>
        <div class="textBox"><div id="mainText" class="mainText questionText"></div></div>
        <div class="hint" id="hint">タップで答えを表示</div>
      </section>
      <aside class="card rail" id="side">
        <div class="actionWrap">
          <button type="button" class="action" id="showAnswerBtn" onclick="showAnswer(event)">答えを見る</button>
          <div class="gradeGroup" id="gradeGroup">
            <button type="button" class="gradeBtn ok" id="okBtn" onclick="grade(true,event)"><span class="mark">○</span>正解</button>
            <button type="button" class="gradeBtn ng" id="ngBtn" onclick="grade(false,event)"><span class="mark">×</span>不正解</button>
          </div>
        </div>
        <div class="microStats" id="stats"></div>
      </aside>
    </div>
    <div class="bottom">
      <div class="progress"><div class="fill" id="fill"></div></div>
      <div class="mode"><button class="pill active" onclick="setMode('normal')" id="mNormal">通常</button><button class="pill" onclick="setMode('wrong')" id="mWrong">苦手</button><button class="pill" onclick="setMode('random')" id="mRandom">ランダム</button></div>
    </div>
  </div>
</div>
<div class="menu" id="menu" onclick="toggleMenu(false)"><div class="menuPanel" onclick="event.stopPropagation()"><h2>メニュー</h2><button class="menuItem" onclick="restart()">▶ 最初から始める</button><button class="menuItem" onclick="setMode('wrong');toggleMenu(false)">◎ 間違えた問題だけ</button><button class="menuItem" onclick="setMode('random');toggleMenu(false)">↝ ランダム出題</button><button class="menuItem" onclick="resetStats()">記録をリセット</button><button class="menuItem" onclick="toggleMenu(false)">閉じる</button></div></div>
<div class="toast" id="toast"></div>
<script>
const QUESTIONS = [{"id": "506", "question": "黒船を率いて、1853年に浦賀へ来航し、開国をせまったアメリカ人はだれですか。", "answer": "ペリー"}, {"id": "507", "question": "ペリーと江戸幕府の間で、1854年に結ばれた条約を何といいますか。", "answer": "日米和親条約"}, {"id": "508", "question": "日米和親条約によって開かれた港を2つ答えなさい。", "answer": "下田・函館"}, {"id": "509", "question": "アメリカが、日本に開国を迫った理由を二つ挙げなさい", "answer": "捕鯨のための基地を得ること。中国との貿易の中継地とするため。"}, {"id": "510", "question": "日本とアメリカの間で貿易が始まることになった、1858年に結ばれた条約を何といいますか。", "answer": "日米修好通商条約"}, {"id": "511", "question": "日米修好通商条約が、日本にとって不利な条約とされたのはなぜですか。", "answer": "領事裁判権（治外法権）を認めていたから"}, {"id": "512", "question": "日米修好通商条約が、日本にとって不平等な条約と言われたもう一つの理由は何ですか。", "answer": "関税自主権がなかったこと"}, {"id": "513", "question": "日米修好通商条約によって開港した港を5つ答えなさい。", "answer": "函館・横浜・新潟・神戸・長崎"}, {"id": "514", "question": "江戸時代の終わりごろ、日本最大の貿易額をあげていた港はどこですか。", "answer": "横浜"}, {"id": "515", "question": "江戸時代末期の日本の主な輸出品を2つ答えなさい。", "answer": "生糸・茶"}, {"id": "516", "question": "日米修好通商条約締結後、外国人を追放しようとする運動を何といいますか。", "answer": "攘夷運動"}, {"id": "517", "question": "攘夷運動が起こったきっかけは何ですか？", "answer": "国内の品不足による物価上昇"}, {"id": "518", "question": "攘夷運動と、天皇中心の国を理想とする尊王思想が結びついた運動を何といいますか。", "answer": "尊王攘夷運動"}, {"id": "519", "question": "彦根藩出身で、朝廷の許可を得ずに日米修好通商条約を結んだ大老はだれですか。", "answer": "井伊直弼"}, {"id": "520", "question": "井伊直弼が1858年から行った、条約反対派を処罰する政策を何といいますか。", "answer": "安政のたい獄"}, {"id": "521", "question": "安政の大獄で処刑された、松下村塾を開いていた長州藩出身の人物はだれですか。", "answer": "吉田松陰"}, {"id": "522", "question": "井伊直弼が暗殺された、1860年の事件を何といいますか。", "answer": "桜田門外の変"}, {"id": "523", "question": "江戸時代末に、倒幕運動の中心となった九州地方の藩はどこですか。", "answer": "薩摩藩"}, {"id": "524", "question": "江戸時代末に、倒幕運動の中心となった中国地方の藩はどこですか。", "answer": "長州藩"}, {"id": "525", "question": "長州藩で奇兵隊を組織し、藩の改革を進めた人物はだれですか。", "answer": "高杉晋作"}, {"id": "526", "question": "現在の横浜市付近で、薩摩藩士がイギリス人を殺傷し、その後の対立のきっかけとなった事件を何といいますか。", "answer": "生麦事件"}, {"id": "527", "question": "生麦事件 をきっかけに、1863年にイギリス と 薩摩藩 の間で起こった戦争を何といいますか。", "answer": "薩英戦争"}, {"id": "528", "question": "薩摩藩と長州藩の間で結ばれた、1866年の同盟を何といいますか。", "answer": "薩長同盟"}, {"id": "529", "question": "薩長同盟の成立に力を尽くした土佐藩出身の人物はだれですか。", "answer": "坂本龍馬"}, {"id": "530", "question": "坂本龍馬の師にあたり、幕府の海軍で活躍した人物はだれですか。", "answer": "勝海舟"}, {"id": "531", "question": "江戸幕府の15代将軍はだれですか。", "answer": "徳川慶喜"}, {"id": "532", "question": "徳川慶喜が1867年に政権を朝廷へ返上したことを何といいますか。", "answer": "大政奉還"}];
let order = QUESTIONS.map((_,i)=>i), pos=0, state='q', sound=false, mode='normal';
const KEY='history_quiz_stats_v10';
let stats = JSON.parse(localStorage.getItem(KEY)||'{}');
function $(id){return document.getElementById(id)}
function save(){localStorage.setItem(KEY, JSON.stringify(stats));}
function current(){return QUESTIONS[order[pos]];}
function shuffle(a){for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function escapeHTML(str){ return String(str).replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }
function lineHTML(lines){ return lines.map(x=>`<span class="line">${escapeHTML(x)}</span>`).join(''); }
function getCandidates(s){
  const arr=[...s], len=arr.length, pts=[];
  const hard='、。？！?';
  for(let i=2;i<len-2;i++){
    const prev=arr[i-1], next=arr[i];
    let w=0;
    if(hard.includes(prev)) w+=120;
    if(prev==='・') w+=80;
    if('はがをにでともへやの'.includes(prev)) w+=30;
    if('。？！?、'.includes(next)) w-=120;
    if('はがをにでともへやの'.includes(next)) w-=35;
    // 数字の直後、熟語の途中っぽい位置は避ける
    if(/[0-9０-９]/.test(prev) || /[0-9０-９]/.test(next)) w-=35;
    if(w>0) pts.push({i,w});
  }
  return pts;
}
function makeLines(s, n){
  const arr=[...s], len=arr.length;
  if(n<=1) return [s];
  const cand=getCandidates(s);
  // 候補が少ない場合は全位置も使う。ただし自然候補に比べてペナルティ。
  for(let i=4;i<len-3;i++) cand.push({i,w:5});
  const target=len/n;
  let best=null;
  function score(breaks){
    const pts=[0,...breaks,len], lines=[];
    for(let k=0;k<pts.length-1;k++) lines.push(arr.slice(pts[k],pts[k+1]).join(''));
    const lens=lines.map(x=>[...x].length);
    const max=Math.max(...lens), min=Math.min(...lens);
    let sc=(max-min)*5 + lens.reduce((a,x)=>a+Math.abs(x-target),0)*2;
    for(const line of lines){ if(/^[、。？！?はがをにでともへやの]/.test(line)) sc+=500; if(/[、。]$/.test(line)) sc-=40; }
    for(const b of breaks){ const c=cand.find(x=>x.i===b); sc -= c ? c.w : 0; }
    return {sc,lines};
  }
  const pools=[];
  for(let k=1;k<n;k++){
    const ideal=Math.round(target*k);
    const sorted=[...new Map(cand.map(c=>[c.i,c])).values()].filter(c=>c.i>2&&c.i<len-2)
      .sort((a,b)=>Math.abs(a.i-ideal)-Math.abs(b.i-ideal) || b.w-a.w).slice(0,14).map(c=>c.i);
    pools.push(sorted);
  }
  function rec(k, arrb){
    if(k===pools.length){
      if(arrb.every((x,i)=>i===0||x>arrb[i-1]+2)){ const r=score(arrb); if(!best||r.sc<best.sc) best=r; }
      return;
    }
    for(const b of pools[k]) rec(k+1,[...arrb,b]);
  }
  rec(0,[]);
  return best ? best.lines : [s];
}
function chooseQuestionLines(text){
  const len=[...text].length;
  // 端末横幅を最大限使う。短文2行、通常3行、長文4行。はみ出したらfitTextで縮小。
  let candidates = len<=34 ? [2,3] : len<=62 ? [3,4] : [4,5];
  let best=candidates[0], bestLines=null;
  for(const n of candidates){ const lines=makeLines(text,n); if(!bestLines || Math.max(...lines.map(x=>[...x].length)) < Math.max(...bestLines.map(x=>[...x].length))) {best=n; bestLines=lines;} }
  return bestLines || [text];
}
function speak(txt){ speechSynthesis.cancel(); if(!sound) return; const u=new SpeechSynthesisUtterance(txt); u.lang='ja-JP'; u.rate=1.03; u.pitch=1; speechSynthesis.speak(u); }
function binaryFit(el, min, max){
  let lo=min, hi=max, best=min;
  for(let i=0;i<18;i++){
    const mid=(lo+hi)/2; el.style.fontSize=mid+'px';
    if(el.scrollHeight <= el.clientHeight + 1 && el.scrollWidth <= el.clientWidth + 1){ best=mid; lo=mid; } else { hi=mid; }
  }
  el.style.fontSize=Math.floor(best*10)/10+'px';
}
function fitText(){
  const el=$('mainText'); const q=current(); const text= state==='a'?q.answer:q.question;
  if(state==='a'){
    el.style.lineHeight='1.30';
    const len=[...text].length; const w=el.clientWidth||600;
    const max=Math.min(76, Math.max(38, w/Math.max(4,len)*1.08));
    binaryFit(el, 26, max);
  } else {
    el.style.lineHeight='1.54';
    const len=[...text].length; const lineCount=el.querySelectorAll('.line').length||3;
    const w=el.clientWidth||700; const longest=Math.max(...[...el.querySelectorAll('.line')].map(x=>[...x.textContent].length), 1);
    let predicted=w/longest*0.94;
    const max = lineCount<=2 ? Math.min(48,predicted) : lineCount===3 ? Math.min(43,predicted) : Math.min(38,predicted);
    const min = len>75 ? 22 : len>58 ? 24 : 27;
    binaryFit(el, min, Math.max(min,max));
  }
}
function render(){
  const q=current(); $('qid').textContent=q.id; $('posNow').textContent=String(pos+1); $('total').textContent=String(order.length); $('fill').style.width=((pos+1)/order.length*100)+'%';
  const st=stats[q.id]||{ok:0,ng:0}; $('stats').innerHTML=`正${st.ok} / 誤${st.ng}<br>${pos+1}/${order.length}`;
  if(state==='q'){
    $('label').textContent='問題'; $('mainText').className='mainText questionText'; $('mainText').innerHTML=lineHTML(chooseQuestionLines(q.question)); $('hint').textContent='タップで答えを表示';
    $('showAnswerBtn').style.display='grid'; $('gradeGroup').style.display='none';
    requestAnimationFrame(()=>{fitText(); if(sound) speak(q.question);});
  } else {
    $('label').textContent='答え'; $('mainText').className='mainText answerText'; $('mainText').innerHTML=lineHTML(String(q.answer).split(/[。]/).filter(Boolean).map((x,i,a)=> i<a.length-1 ? x+'。' : x)); $('hint').textContent='正解 / 不正解を選んで次へ';
    $('showAnswerBtn').style.display='none'; $('gradeGroup').style.display='grid';
    requestAnimationFrame(()=>{fitText(); if(sound) speak(q.answer);});
  }
}
function tapMain(){ if(state==='q') showAnswer(); }
function showAnswer(e){ if(e) e.stopPropagation(); state='a'; render(); }
function grade(ok,e){ if(e) e.stopPropagation(); const q=current(); stats[q.id]=stats[q.id]||{ok:0,ng:0}; if(ok) stats[q.id].ok++; else stats[q.id].ng++; save(); toast(ok?'正解！':'次は正解できる！'); next(); }
function next(){ pos++; if(pos>=order.length) pos=0; state='q'; render(); }
function setMode(m){ mode=m; document.querySelectorAll('.pill').forEach(x=>x.classList.remove('active')); if(m==='normal'){order=QUESTIONS.map((_,i)=>i);$('mNormal').classList.add('active');} if(m==='random'){order=shuffle(QUESTIONS.map((_,i)=>i));$('mRandom').classList.add('active');} if(m==='wrong'){order=QUESTIONS.map((q,i)=>({q,i})).filter(x=>(stats[x.q.id]?.ng||0)>0).map(x=>x.i); if(!order.length){toast('まだ間違えた問題がありません'); order=QUESTIONS.map((_,i)=>i); $('mNormal').classList.add('active');} else $('mWrong').classList.add('active');} pos=0; state='q'; render();}
function toggleSound(){ sound=!sound; $('soundBtn').textContent=sound?'♪ ON':'♪ OFF'; if(!sound) speechSynthesis.cancel(); else render(); }
function toggleMenu(force){ const m=$('menu'); m.classList.toggle('show', force===undefined?!m.classList.contains('show'):force); }
function restart(){ pos=0; state='q'; toggleMenu(false); render(); }
function resetStats(){ if(confirm('記録をリセットしますか？')){stats={};save();render();toggleMenu(false);} }
function toast(t){ const el=$('toast'); el.textContent=t; el.style.display='block'; clearTimeout(window._to); window._to=setTimeout(()=>el.style.display='none',900); }
window.addEventListener('resize',()=>setTimeout(fitText,80));
render();
</script>
</body>
</html>
