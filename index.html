<style>
:root {
  --accent:#D32F50;
  --ink:#1f2328;
  --muted:#7b8492;
  --paper:#ffffff;
  --bg:#f3f1ed;
  --line:#e7e2db;
  --blueLabel:#7AA5D8;
  --bluePaper:#F5F7FA;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif;color:var(--ink)}
body{touch-action:manipulation}
#portraitGuard{display:none;position:fixed;inset:0;background:#f7f5f1;z-index:100;align-items:center;justify-content:center;text-align:center;padding:32px}
#portraitGuard .box{font-size:clamp(24px,6vw,42px);font-weight:800;letter-spacing:.02em;color:#30343a}
#portraitGuard .sub{margin-top:18px;font-size:16px;color:#7b8492;font-weight:600}
.app{height:100svh;width:100vw;padding:calc(env(safe-area-inset-top) + 10px) calc(env(safe-area-inset-right) + 12px) calc(env(safe-area-inset-bottom) + 10px) calc(env(safe-area-inset-left) + 14px);display:flex;flex-direction:column;gap:10px}
.topbar{height:42px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-shrink:0}
.meta{display:flex;align-items:baseline;gap:16px;min-width:0;white-space:nowrap}
.era{font-size:clamp(22px,3.1vw,32px);font-weight:900;color:var(--accent);letter-spacing:.03em;min-width:6.5em;text-align:left;transform:translateX(-4px)}
.qno{font-size:clamp(15px,1.8vw,20px);font-weight:800;color:#3f454d}
.progress{font-size:clamp(15px,1.8vw,20px);font-weight:800;color:var(--muted)}
.tools{display:flex;gap:8px;align-items:center}
.toolBtn{border:1px solid var(--line);background:#fff;border-radius:999px;height:34px;padding:0 14px;font-weight:800;color:#515b68;font-size:13px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.main{flex:1;min-height:0;display:grid;grid-template-columns:minmax(0,1fr) 164px;gap:12px}
.card{position:relative;background:var(--paper);border-radius:26px;border:1px solid var(--line);box-shadow:0 10px 26px rgba(32,28,20,.08);overflow:hidden;min-width:0;transition:background .12s ease}
.card.peek{background:var(--bluePaper)}
.label{position:absolute;top:22px;left:28px;font-size:clamp(24px,3.1vw,34px);font-weight:950;color:var(--accent);letter-spacing:.12em;line-height:1;z-index:2;transition:color .12s ease}
.card.peek .label{color:var(--blueLabel)}
.textWrap{position:absolute;left:34px;right:34px;top:72px;bottom:34px;display:flex;align-items:center;justify-content:center;text-align:center}
.text{font-weight:850;letter-spacing:.015em;line-height:1.52;max-width:100%;max-height:100%;white-space:normal;word-break:keep-all;overflow-wrap:normal;line-break:strict;text-wrap:pretty}
.text.answer{font-weight:950;line-height:1.35}
.side{display:flex;flex-direction:column;gap:10px;min-width:0}
.primaryBtn,.scoreBtn,.peekBtn{border:0;border-radius:24px;font-weight:950;letter-spacing:.04em;box-shadow:0 8px 20px rgba(32,28,20,.08);user-select:none;-webkit-user-select:none}
.primaryBtn{background:var(--accent);color:#fff;font-size:clamp(20px,2.7vw,26px);height:100%;min-height:118px;flex:1}
.scoreArea{display:none;flex-direction:column;gap:10px;height:100%}
.peekBtn{background:#eef5fb;color:#426d9f;border:1px solid #d9e7f5;font-size:clamp(15px,1.8vw,18px);height:52px;flex:0 0 auto}
.scoreRow{display:grid;grid-template-columns:1fr;gap:10px;flex:1;min-height:0}
.scoreBtn{font-size:clamp(22px,2.8vw,30px);background:#fff;color:#2f363d;border:1px solid var(--line);min-height:86px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px}
.scoreBtn .mark{font-size:clamp(32px,4.8vw,48px);line-height:.9}
.scoreBtn.good .mark{color:#1d8b5d}
.scoreBtn.bad .mark{color:#c33d4e}
.stats{height:38px;display:flex;align-items:center;justify-content:center;border-radius:18px;background:#fff;border:1px solid var(--line);font-size:12px;font-weight:800;color:var(--muted);flex-shrink:0}
.menu{position:fixed;right:18px;top:58px;width:min(360px,82vw);max-height:calc(100svh - 82px);overflow:auto;background:#fff;border:1px solid var(--line);border-radius:24px;box-shadow:0 20px 60px rgba(0,0,0,.18);padding:16px;z-index:20;display:none}
.menu.show{display:block}
.menu h2{margin:0 0 10px;font-size:18px}
.menu button{width:100%;height:44px;border-radius:16px;border:1px solid var(--line);background:#f7f5f1;margin:5px 0;font-weight:850;color:#30343a}
@media (orientation:portrait){#portraitGuard{display:flex}.app{display:none}}
@media (max-height:430px){.app{gap:8px;padding-top:calc(env(safe-area-inset-top) + 7px);padding-bottom:calc(env(safe-area-inset-bottom) + 7px)}.topbar{height:36px}.main{grid-template-columns:minmax(0,1fr) 154px;gap:10px}.label{top:18px;left:26px}.textWrap{top:64px;bottom:28px;left:30px;right:30px}.primaryBtn{min-height:100px}.scoreBtn{min-height:72px}.peekBtn{height:48px}}
</style>
</head>

<script>
const QUESTIONS = [{"id": 1, "question": "日本で初めて旧石器時代の存在を明らかにした人物は誰か。", "answer": "相沢忠洋", "era": "古代"}, {"id": 2, "question": "相沢忠洋が発見した遺跡を何というか。", "answer": "岩宿遺跡", "era": "古代"}, {"id": 3, "question": "岩宿遺跡は現在のどこにあるか。", "answer": "群馬県", "era": "古代"}, {"id": 4, "question": "岩宿遺跡の発見によって、それまでのどのような考えがくつがえされたか。", "answer": "日本には旧石器時代がなかったという考え", "era": "古代"}, {"id": 5, "question": "旧石器時代に使われた、打ち砕いて作った石器を何というか。", "answer": "打製石器", "era": "古代"}, {"id": 6, "question": "旧石器時代の人々の生活はどのような特徴を持つか。", "answer": "狩りや採集を中心とした移動生活", "era": "古代"}, {"id": 7, "question": "打製石器を、さらに使いやすくするために加工された石器を何というか。", "answer": "磨製石器", "era": "古代"}, {"id": 8, "question": "縄文時代に、縄目の文様がついた土器を何というか。", "answer": "縄文土器", "era": "古代"}, {"id": 9, "question": "縄文時代の人々が食料を煮たり保存したりするために使ったものは何か。", "answer": "縄文土器", "era": "古代"}, {"id": 10, "question": "縄文時代に見られる、地面を掘って柱を立てて作る住居を何というか。", "answer": "竪穴住居", "era": "古代"}, {"id": 11, "question": "縄文時代の人々は、自分たちで手に入らないものをどのように得ていましたか。", "answer": "物々交換", "era": "古代"}, {"id": 12, "question": "縄文時代の遺跡から出土する、素焼きの人形を何というか。", "answer": "土偶", "era": "古代"}, {"id": 13, "question": "縄文時代のゴミ捨て場の跡をなんと呼びますか。", "answer": "貝塚", "era": "古代"}, {"id": 14, "question": "明治時代にエドワード・モースが発見した遺跡の名前は。", "answer": "大森貝塚", "era": "古代"}, {"id": 15, "question": "縄文時代の大規模な集落跡として知られる青森県の遺跡の名前は。", "answer": "三内丸山遺跡", "era": "古代"}, {"id": 16, "question": "三内丸山遺跡の生活の特徴は何ですか。", "answer": "定住生活と原始農耕", "era": "古代"}, {"id": 17, "question": "弥生時代に使われた、うすくてかたい赤褐色の土器を何と呼びますか。", "answer": "弥生土器", "era": "古代"}, {"id": 18, "question": "弥生時代に使われた青銅製の道具の一つで、祭りに使われたものは何か。", "answer": "銅鐸", "era": "古代"}, {"id": 19, "question": "弥生時代の代表的な遺跡の名前は。", "answer": "登呂遺跡", "era": "古代"}, {"id": 20, "question": "静岡県の登呂遺跡からわかる、弥生時代の主な生産活動は何ですか。", "answer": "稲作", "era": "古代"}, {"id": 21, "question": "弥生時代の大規模な環濠集落として知られる遺跡はどこか。", "answer": "吉野ヶ里遺跡", "era": "古代"}, {"id": 22, "question": "弥生時代の遺跡から出た人骨に傷が見つかったことからわかることは何ですか。", "answer": "人間同士の争いがあった", "era": "古代"}, {"id": 23, "question": "西暦57年に、後漢の皇帝から金印を授けられた国はどこか。", "a "question": "日本と中国の国交を正常化する、1972年の文書を何といいますか。", "answer": "日中共同声明", "era": "戦後・現代"}, {"id": 725, "question": "日中共同声明が発表されたときの日本の内閣総理大臣はだれですか。", "answer": "田中角栄", "era": "戦後・現代"}, {"id": 726, "question": "日本の高度経済成長が終わるきっかけとなる、1973年に起こった出来事を何といいますか。", "answer": "第一次石油危機（第一次オイルショック）", "era": "戦後・現代"}, {"id": 727, "question": "1975年に初めて開かれた、先進国首脳による会議を何といいますか。", "answer": "サミット", "era": "戦後・現代"}, {"id": 728, "question": "日本と中国との間で1978年に結ばれた、両国の友好関係のための条約を何といいますか。", "answer": "日中平和 友好条約", "era": "戦後・現代"}, {"id": 729, "question": "アメリカとソ連の首脳が冷戦終結に合意した、1989年の会談を何といいますか。", "answer": "マルタ会談", "era": "戦後・現代"}, {"id": 730, "question": "多国籍軍がクウェートを解放するために、1991年に起こした戦争を何といいますか。", "answer": "湾岸戦争", "era": "戦後・現代"}, {"id": 731, "question": "国連の平和維持活動に日本の自衛隊が参加できるよう、1992年に定めた法律を何といいますか。", "answer": "PKO協力法", "era": "戦後・現代"}, {"id": 732, "question": "公害対策基本法に代わって、1993年に定められた環境に関する法律を何といいますか。", "answer": "環境基本法", "era": "戦後・現代"}, {"id": 733, "question": "2001年に設置された、公害対策や環境保護を担当する省庁を何といいますか。", "answer": "環境省", "era": "戦後・現代"}];
let order = QUESTIONS.map((_,i)=>i);
let pos = 0;
let showingAnswer = false;
let voiceOn = false;
let peekMode = false;
const els = {
 era:document.getElementById('era'), qno:document.getElementById('qno'), progress:document.getElementById('progress'),
 label:document.getElementById('label'), text:document.getElementById('mainText'), card:document.getElementById('card'),
 answerBtn:document.getElementById('answerBtn'), scoreArea:document.getElementById('scoreArea'), goodBtn:document.getElementById('goodBtn'), badBtn:document.getElementById('badBtn'),
 stats:document.getElementById('stats'), voiceBtn:document.getElementById('voiceBtn'), menuBtn:document.getElementById('menuBtn'), menu:document.getElementById('menu'), peekBtn:document.getElementById('peekBtn')
};
function getStats(){ try{return JSON.parse(localStorage.getItem('historyQuizStats')||'{}')}catch(e){return {}} }
function setStats(s){localStorage.setItem('historyQuizStats',JSON.stringify(s))}
const noBreakTerms = Array.from(new Set(QUESTIONS.flatMap(q=>[q.answer, ...q.question.match(/[一-龯々ァ-ヶーA-Za-z0-9０-９・＝％%（）()](3,)/g)||[]])
  .filter(s=>s && s.length>=3 && s.length<=18))).sort((a,b)=>b.length-a.length).slice(0,1400);
function smartBreakText(raw){
  let s = raw.replace(/\s+/g,'').replace(/([0-9０-９]+)(年|月|日|％|%|円)/g,'$1$2');
  // preferred breakpoints only. keep-all prevents arbitrary Japanese breaks; ZWSP enables safe breaks.
  s = s.replace(/([、。？?])/g,'$1​');
  s = s.replace(/(から|まで|として|など|によって|について|という|ために|ことで|あとに|もとに|のちに|または|および|そして|しかし|、)/g,'$1​');
  s = s.replace(/([はがをにでとへもやの])(?=[^、。？?](7,))/g,'$1​');
  // remove break inside protected numeric dates
  s = s.replace(/([0-9０-９])​(?=[0-9０-９])/g,'$1');
  s = s.replace(/([0-9０-９]+)​(年|月|日|％|%|円)/g,'$1$2');
  return s;
}
function setTextSmart(el, text){ el.textContent=''; el.appendChild(document.createTextNode(smartBreakText(text))); }
function getLineRects(el){
  const range=document.createRange(); range.selectNodeContents(el);
  return Array.from(range.getClientRects()).filter(r=>r.width>2 && r.height>2);
}
function fitText(){
  const el=els.text, wrap=el.parentElement;
  const q=QUESTIONS[order[pos]];
  const len=(showingAnswer||peekMode ? (peekMode?q.question:q.answer) : q.question).length;
  const isAns=showingAnswer&&!peekMode;
  let max=isAns?64:50, min=isAns?28:30;
  if(!isAns){ if(len>58) max=39; else if(len>46) max=43; else if(len>34) max=47; }
  else { if(len>24) max=44; else if(len>14) max=54; }
  let size=max;
  for(let i=0;i<36;i++){
    el.style.fontSize=size+'px';
    const overflow = el.scrollWidth > wrap.clientWidth+1 || el.scrollHeight > wrap.clientHeight+1;
    const rects=getLineRects(el);
    const last = rects[rects.length-1];
    const lastShort = rects.length>=2 && last && last.width < wrap.clientWidth*0.23; // about 8-10 chars
    if(!overflow && (!lastShort || size<=min+2)) break;
    size -= lastShort ? 2 : 1;
    if(size<min){ size=min; el.style.fontSize=size+'px'; break; }
  }
}
function speak(text){ if(!voiceOn || !('speechSynthesis' in window)) return; speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(text); u.lang='ja-JP'; u.rate=1.05; speechSynthesis.speak(u); }
function render(say=false){
  const q=QUESTIONS[order[pos]];
  els.era.textContent=q.era;
  els.qno.textContent='問題'+q.id;
  els.progress.textContent=(pos+1)+'/'+order.length;
  els.card.classList.toggle('peek', peekMode);
  if(showingAnswer && !peekMode){
    els.label.textContent='答え'; els.text.className='text answer'; setTextSmart(els.text,q.answer);
    els.answerBtn.style.display='none'; els.scoreArea.style.display='flex';
  } else {
    els.label.textContent='問題'; els.text.className='text'; setTextSmart(els.text,q.question);
    if(showingAnswer){ els.answerBtn.style.display='none'; els.scoreArea.style.display='flex'; }
    else { els.answerBtn.style.display='block'; els.scoreArea.style.display='none'; }
  }
  updateStats(); requestAnimationFrame(()=>requestAnimationFrame(fitText));
  if(say) speak((showingAnswer && !peekMode)?q.answer:q.question);
}
function updateStats(){ const q=QUESTIONS[order[pos]], s=getStats()[q.id]||{good:0,bad:0}; els.stats.textContent='正解 '+s.good+' / 不正解 '+s.bad; }
function showAnswer(){ showingAnswer=true; peekMode=false; render(true); }
function mark(kind){ const q=QUESTIONS[order[pos]]; const s=getStats(); s[q.id]=s[q.id]||{good:0,bad:0}; s[q.id][kind]++; setStats(s); pos=(pos+1)%order.length; showingAnswer=false; peekMode=false; render(true); }
els.answerBtn.addEventListener('click', showAnswer);
els.goodBtn.addEventListener('click',()=>mark('good'));
els.badBtn.addEventListener('click',()=>mark('bad'));
els.voiceBtn.addEventListener('click',()=>{voiceOn=!voiceOn; els.voiceBtn.textContent='音声 '+(voiceOn?'ON':'OFF'); if(voiceOn) render(true);});
els.menuBtn.addEventListener('click',()=>els.menu.classList.toggle('show'));
document.getElementById('resetBtn').addEventListener('click',()=>{ if(confirm('成績をリセットしますか？')){localStorage.removeItem('historyQuizStats'); updateStats();} });
document.getElementById('shuffleBtn').addEventListener('click',()=>{ order=order.map(v=>[Math.random(),v]).sort((a,b)=>a[0]-b[0]).map(v=>v[1]); pos=0; showingAnswer=false; peekMode=false; els.menu.classList.remove('show'); render(true); });
document.getElementById('normalBtn').addEventListener('click',()=>{ order=QUESTIONS.map((_,i)=>i); pos=0; showingAnswer=false; peekMode=false; els.menu.classList.remove('show'); render(true); });
function startPeek(e){ if(!showingAnswer) return; e.preventDefault(); peekMode=true; render(false); }
function endPeek(e){ if(!showingAnswer) return; e.preventDefault(); peekMode=false; render(false); }
['touchstart','mousedown'].forEach(ev=>els.peekBtn.addEventListener(ev,startPeek,{passive:false}));
['touchend','touchcancel','mouseup','mouseleave'].forEach(ev=>els.peekBtn.addEventListener(ev,endPeek,{passive:false}));
window.addEventListener('resize',()=>setTimeout(fitText,150));
render(false);
</script>
