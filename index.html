<body>
<div id="portraitGuard"><div class="guardBox"><div class="guardIcon">↻</div><div class="guardText">横向きにしてください</div><div class="guardSub">この教材は横画面で見やすく設計しています</div></div></div>

  <div class="splashCard">
    <div class="splashKicker">HISTORY STUDY</div>
    <div class="splashTitle">歴史<span class="num">733</span></div>
    <div class="splashCopy">今日も少し進めよう</div>
    <button id="startStudyBtn" class="startStudyBtn">学習を始める</button>
    <div class="splashFoot">タップしてチャプターを選択</div>
  </div>
</div>

<div class="app">
  <header class="topbar">
    <div id="period" class="period">江戸時代</div>
    <div id="meta" class="meta"><span id="qidPill" class="pill qPill">問題512</span><span id="remainPill" class="pill remainPill">残り0問</span></div>
    <div class="miniBtns"><button id="soundBtn" class="miniBtn">音声 OFF</button><button id="menuBtn" class="miniBtn">メニュー</button></div>
  </header>
  <main class="stage">
    <section class="card">
      <div id="label" class="label">問題</div>
      <div class="textArea"><div id="mainText" class="mainText"></div></div>
    </section>
    <aside class="side">
      <div class="actionPanel">
        <button id="answerBtn" class="primaryBtn">答えを見る</button>

奉公によって結ばれた関係を何といいますか。", "answer": "封建制度（ほうけん）", "period": "鎌倉幕府"}, {"id": 210, "question": "鎌倉と各地の御家人の領地を結ぶために作られた道を何といいますか。", "answer": "鎌倉街道", "period": "鎌倉幕府"}, {"id": 211, "question": "敵が攻め込みにくいように、わざと狭く作られた鎌倉への出入り口を何といいますか。", "answer": "切通し", "period": "鎌倉幕府"}, {"id": 212, "question": "鎌倉時代の武士が行った代表的な武芸を3つ答えなさい。", "answer": "流鏑馬・笠懸・犬追物", "period": "鎌倉幕府"}, {"id": 213, "question": "これらの武芸をまとめて何と呼びますか。", "answer": "騎射三物（きしゃみつもの）", "period": "鎌倉幕府"}, {"id": 214, "question": "鎌倉幕府の初代執権はだれですか。", "answer": "北条時政", "period": "鎌倉幕府"}, {"id": 215, "question": "源氏の将軍が3代で途絶えると、政治の実権を朝廷に取り戻そうとした人物はだれですか。", "answer": "後鳥羽上皇", "period": "鎌倉幕府"}, {"id": 216, "question": "後鳥羽上皇が討伐の命令を下した2代執権はだれですか。", "answer": "北条義時", "period": "鎌倉幕府"}, {"id": 217, "question": "朝廷と鎌倉幕府の間で、1221年に起こった戦いを何といいますか。", "answer": "承久の乱", "period": "鎌倉幕府"}, {"id": 218, "question": "承久の乱で、幕府側の御家人を束ね「尼将軍」とよばれた人物はだれですか。", "answer": "北条政子", "period": "鎌倉幕府"}, {"id": 219, "question": "承久の乱の後、後鳥羽上皇はどこへ流されましたか。", "answer": "隠岐（おき）", "period": "鎌倉幕府"}, {"id": 220, "question": "承久の乱の後、京都に置かれた朝廷や西日本の武士を監視する役所を何といいますか。", "answer": "六波羅探題（ろくはらたんだい）", "period": "鎌倉幕府"}, {"id": 221, "question": "鎌倉幕府の3代執権はだれですか。", "answer": "北条泰時", "period": "鎌倉幕府"}, {"id": 222, "question": "北条泰時が1232年に定めた最初の武家法を何といいますか。", "answer": "御成敗式目", "period": "鎌倉幕府"}, {"id": 223, "question": "御成敗式目の別名は何ですか。", "answer": "貞永式目（じょうえいしきもく）", "period": "鎌倉幕府"}, {"id": 224, "question": "御成敗式目が制定された主な理由を答えなさい。", "answer": "御家人同士の土地争いなどが増え、裁判の基準をはっきりさせる必要があったため", "period": "鎌倉幕府"}, {"id": 225, "question": "1206年にモンゴル帝国を建国した人物はだれですか。", "answer": "チンギス＝ハン", "period": "元寇・鎌倉文化"}, {"id": 226, "question": "チンギス＝ハンの孫で、元を建国した人物はだれですか。", "answer": "フビライ＝ハン", "period": "元寇・鎌倉文化"}, {"id": 227, "question": "フビライ＝ハンに仕え、「東方見聞録」を著したイタリア人商人はだれですか。", "answer": "マルコ＝ポーロ", "period": "元寇・鎌倉文化"}, {"id": 228, "question": "新羅を征服して、朝鮮半島を統一し、その後元の支配下に置かれた国はどこですか。", "answer": "高麗（こうらい）", "period": "元寇・鎌倉文化"}, {"id": 229, "question": "元軍と日本の御家人たちとの間で、1274年に起こった戦いを何といいますか。", "answer": "文永の役", "period": "元寇・鎌倉文化"}, {"id": 230, "question": "文永の役の時、鎌倉幕府の8代執権を務めていた人物はだれですか。", "answer": "北条時宗", "period": "元寇・鎌倉文化"}, {"id": 231, "question": "文永の役で、元軍が「てつはう」と呼ばれる兵器に使ったものは何ですか。", "answer": "火薬", "period": "元寇・鎌倉文化"}, {"id": 232, "question": "文永の役の後、幕府が博多湾沿岸に築いた防御施設を何といいますか。", "answer": "石塁（防塁）", "period": "元寇・鎌倉文化"}, {"id": 233, "question": "元軍が1281年に、再び日本を攻めた戦いを何といいますか。", "answer": "弘安の役", "period": "元寇・鎌倉文化"}, {"id": 234, "question": "1274年と1281年の2度にわたる、元軍の日本への攻撃を何といいますか。", "answer": "元寇", "period": "元寇・鎌倉文化"}, {"id": 235, "question": "元との戦いの様子を、武士の竹崎季長が描かせた絵巻物を何といいますか。", "answer": "蒙古襲来絵詞（もうこしゅうらいえことば）", "period": "元寇・鎌倉文化"}, {"id": 236, "question": "元寇の後、鎌倉幕府が衰えた理由を答えなさい。", "answer": "恩賞である土地を十分に与えられず、御家人からの不満が高まったため。", "period": "元寇・鎌倉文化"}, {"id": 237, "question": "借金に苦しむ御家人たちを救済するために、1297年に幕府が出した法令を何といいますか。", "answer": "永仁の徳政令", "period": "元寇・鎌倉文化"}, {"id": 238, "question": "鎌倉時代の武士の館のつくりを何といいますか。", "answer": "武家造", "period": "元寇・鎌倉文化"}, {"id": 239, "question": "鎌倉時代、西日本で始まった農業の方法で、米の裏作として麦などを栽培することを何といいますか。", "answer": "二毛作", "period": "元寇・鎌倉文化"}, {"id": 240, "question": "鎌倉時代の農業技術の進歩として、どのようなことが行われるようになりましたか。", "answer": "牛馬を利用しての耕作、肥料として草や木の灰を用いた", "period": "元寇・鎌倉文化"}, {"id": 241, "question": "鎌倉時代、寺社の門前などで月に3回ほど開かれた市場を何といいますか。", "answer": "定期市", "period": "元寇・鎌倉文化"}, {"id": 242, "question": "定期市で主に使われた、中国から輸入された貨幣を何といいますか。", "answer": "宋銭", "period": "元寇・鎌倉文化"}, {"id": 243, "question": "運送業者や倉庫業者として、貨物の輸送や保管を行った商人を何といいますか。", "answer": "問丸", "period": "元寇・鎌倉文化"}, {"id": 244, "question": "同じ職業の商人や職人が集まり、特権を得るためにつくった団体を何といいますか。", "answer": "座", "period": "元寇・鎌倉文化"}, {"id": 245, "question": "鎌倉時代に、新しい仏教である浄土宗を開いた人物はだれですか。", "answer": "法然", "period": "鎌倉新仏教"}, {"id": 246, "question": "法然が開いた仏教の宗派を何といいますか。", "answer": "浄土宗", "period": "鎌倉新仏教"}, {"id": 247, "question": "法然は、どのような念仏を唱えることで救われると説きましたか。", "answer": "南無阿弥陀仏", "period": "鎌倉新仏教"}, {"id": 248, "question": "法然の弟子で、浄土真宗を開いた人物はだれですか。", "answer": "親鸞", "period": "鎌倉新仏教"}, {"id": 249, "question": "親鸞が開いた、「一向宗」ともよばれる宗派を何といいますか。", "answer": "浄土真宗", "period": "鎌倉新仏教"}, {"id": 250, "question": "踊り念仏を広め、時宗を開いた人物はだれですか。", "answer": "一遍", "period": "鎌倉新仏教"}, {"id": 251, "question": "一遍が開いた宗派を何といいますか。", "answer": "時宗", "period": "鎌倉新仏教"}, {"id": 252, "question": "題目を唱えることで救われると説き、日蓮宗を開いた人物はだれですか。", "answer": "日蓮", "period": "鎌倉新仏教"}, {"id": 253, "question": "日蓮が開いた宗派を何といいますか。", "answer": "日蓮宗（法華宗）", "period": "鎌倉新仏教"}, {"id": 254, "question": "日蓮は、どのような題目を唱えることで救われると説きましたか。", "answer": "南無妙法蓮華経", "period": "鎌倉新仏教"}, {"id": 255, "question": "座禅などの修行を重視した仏教の宗派を何といいますか。", "answer": "禅宗", "period": "鎌倉新仏教"}, {"id": 256, "question": "栄西が開いた禅宗の宗派を何といいますか。", "answer": "臨済宗", "period": "鎌倉新仏教"}, {"id": 257, "question": "道元が開いた禅宗の宗派を何といいますか。", "answer": "曹洞宗", "period": "鎌倉新仏教"}, {"id": 258, "question": "曹洞宗を開いた人物はだれですか。", "answer": "道元", "period": "鎌倉新仏教"}, {"id": 259, "question": "道元が開いた曹洞宗の総本山となった寺は何ですか。", "answer": "永平寺", "period": "鎌倉新仏教"}, {"id": 260, "question": "鎌倉新仏教が人々に広まった理由は何ですか。", "answer": "教えがわかりやすかったため", "period": "鎌倉新仏教"}, {"id": 261, "question": "鎌倉時代に中国から伝わり、武士の間に広まった禅宗の宗派を2つ答えなさい。", "answer": "臨済宗・曹洞宗", "period": "鎌倉新仏教"}, {"id": 262, "question": "鎌倉時代初期に再建された東大寺の有名な門を何といいますか。", "answer": "東大寺南大門", "period": "鎌倉新仏教"}, {"id": 263, "question": "東大寺南大門にある仁王像を何といいますか。", "answer": "金剛力士像", "period": "鎌倉新仏教"}, {"id": 264, "question": "金剛力士像をつくった人物を2人答えなさい。", "answer": "運慶・快慶", "period": "鎌倉新仏教"}, {"id": 265, "question": "鎌倉時代の禅宗様式の建築で、国宝に指定されている、円覚寺の建物を何といいますか。", "answer": "円覚寺舎利殿", "period": "鎌倉新仏教"}, {"id": 266, "question": "鎌倉時代に成立した、平氏の栄枯盛衰や源平の争乱を描いた軍記物を何といいますか。", "answer": "平家物語", "period": "鎌倉新仏教"}, {"id": 267, "question": "琵琶を弾きながら平家物語を語り伝えた人々を何といいますか。", "answer": "琵琶法師（びわほうし）", "period": "鎌倉新仏教"}, {"id": 268, "question": "後鳥羽上皇の命令により編さんされた和歌集を何といいますか。", "answer": "新古今和歌集", "period": "鎌倉新仏教"}, {"id": 269, "question": "新古今和歌集の編さんや小倉百人一首で知られる歌人はだれですか。", "answer": "藤原定家（さだいえ）", "period": "鎌倉新仏教"}, {"id": 270, "question": "吉田兼好が著した随筆集を何といいますか。", "answer": "徒然草（つれづれぐさ）", "period": "鎌倉新仏教"}, {"id": 271, "question": "方丈記の作者は誰ですか。", "answer": "鴨長明（かものちょうめい）", "period": "鎌倉新仏教"}, {"id": 272, "question": "鎌倉幕府が1333年に滅亡すると、後醍醐天皇による新しい政治が行われるようになりました。この政治を何といいますか。", "answer": "建武の新政", "period": "南北朝・室町幕府"}, {"id": 273, "question": "建武の新政を行った天皇はだれですか。", "answer": "後醍醐天皇", "period": "南北朝・室町幕府"}, {"id": 274, "question": "建武の新政が２年ほどで失敗した後、後醍醐天皇が逃れ、南朝を開いた場所はどこですか。", "answer": "吉野", "period": "南北朝・室町幕府"}, {"id": 275, "question": "朝廷が南北に分かれて対立した時代を何といいますか。", "answer": "南北朝時代", "period": "南北朝・室町幕府"}, {"id": 276, "question": "南北朝時代に勢力を強め、各地を支配するようになった有力な守護を何といいますか。", "answer": "守護大名", "period": "南北朝・室町幕府"}, {"id": 277, "question": "征夷大将軍に、1338年になった人物はだれですか。", "answer": "足利尊氏", "period": "南北朝・室町幕府"}, {"id": 278, "question": "足利尊氏が開いた幕府は、のちに何とよばれるようになりましたか。", "answer": "室町幕府", "period": "南北朝・室町幕府"}, {"id": 279, "question": "室町幕府で、将軍を補佐するために置かれた役職を何といいますか。", "answer": "管領（かんれい）", "period": "南北朝・室町幕府"}, {"id": 280, "question": "室町幕府の3代将軍はだれですか。", "answer": "足利義満", "period": "南北朝・室町幕府"}, {"id": 281, "question": "足利義満が京都の室町に造営した屋敷を何と呼ばれますか。", "answer": "花の御所", "period": "南北朝・室町幕府"}, {"id": 282, "question": "足利義満が南北朝を統一した年号を答えなさい。", "answer": "1392年", "period": "南北朝・室町幕府"}, {"id": 283, "question": "足利義満が使いを送った当時の中国の王朝を何といいますか。", "answer": "明（みん）", "period": "南北朝・室町幕府"}, {"id": 284, "question": "足利義満のころ、中国や朝鮮の沿岸を荒らしていた海賊を何といいますか。", "answer": "倭寇（わこう）", "period": "南北朝・室町幕府"}, {"id": 285, "question": "倭寇と貿易船を区別するために用いられたものを何といいますか。", "answer": "勘合（かんごう）", "period": "南北朝・室町幕府"}, {"id": 286, "question": "勘合を用いて行われた貿易を何といいますか。", "answer": "勘合貿易", "period": "南北朝・室町幕府"}, {"id": 287, "question": "中国の皇帝にみつぎ物を送り、その国との貿易を認めてもらうことを何といいますか。", "answer": "朝貢（ちょうこう）", "period": "南北朝・室町幕府"}, {"id": 288, "question": "室町時代前半、足利義満のころに栄えた文化を何といいますか。", "answer": "北山文化", "period": "南北朝・室町幕府"}, {"id": 289, "question": "足利義満が京都の北山に建てた建物を何といいますか。", "answer": "鹿苑寺金閣（金閣）", "period": "南北朝・室町幕府"}, {"id": 290, "question": "足利義満の保護を受けた観阿弥・世阿弥の親子によって大成された芸能を何といいま id": 448, "question": "徳川吉宗が定めた、大名から米を差し出させる制度を何といいますか。", "answer": "上げ米の制", "period": "元禄・享保"}, {"id": 449, "question": "上げ米の制では、大名が米を差し出すかわりに、どんな見返りが与えられましたか。", "answer": "参勤交代の期間を短くしてもらえた", "period": "元禄・享保"}, {"id": 450, "question": "1742年に、大岡忠相に作らせた、裁判の基準となる法令集を何といいますか。", "answer": "公事方御定書", "period": "元禄・享保"}, {"id": 451, "question": "徳川吉宗が、さつまいもの栽培研究を命じた人物はだれですか。", "answer": "青木昆陽", "period": "元禄・享保"}, {"id": 452, "question": "米価引き上げのために、さまざまな対策を講じた徳川吉宗は、何と呼ばれましたか。", "answer": "米将軍", "period": "元禄・享保"}, {"id": 453, "question": "江戸時代から使われるようになった、田畑を深く耕す農具を何といいますか。", "answer": "備中ぐわ", "period": "江戸産業・学問"}, {"id": 454, "question": "江戸時代から使われるようになった、脱穀に使う農具を何といいますか。", "answer": "千歯こき", "period": "江戸産業・学問"}, {"id": 455, "question": "江戸時代から使われるようになった、米粒ともみ殻を選別する農具を何といいますか。", "answer": "唐箕（とうみ）", "period": "江戸産業・学問"}, {"id": 456, "question": "江戸時代から使われるようになった、干した魚を材料にした肥料を何といいますか。", "answer": "干鰯（ほしか）", "period": "江戸産業・学問"}, {"id": 457, "question": "江戸時代から使われるようになった、油をしぼった後のかすを利用した肥料を何といいますか。", "answer": "油かす", "period": "江戸産業・学問"}, {"id": 458, "question": "商人に売って現金を得るために栽培される、茶や木綿などの作物を何といいますか。", "answer": "商品作物", "period": "江戸産業・学問"}, {"id": 459, "question": "儒教や仏教が伝わる以前の日本人の考え方を研究する学問を何といいますか。", "answer": "国学", "period": "江戸産業・学問"}, {"id": 460, "question": "「古事記伝」を著した、国学の代表的な学者はだれですか。", "answer": "本居宣長", "period": "江戸産業・学問"}, {"id": 461, "question": "江戸時代に発達した、主にオランダを通じてもたらされた西洋の学問を何といいますか。", "answer": "蘭学", "period": "江戸産業・学問"}, {"id": 462, "question": "オランダの解剖書「ターヘル・アナトミア」を翻訳して作られた医学書を何といいますか。", "answer": "解体新書", "period": "江戸産業・学問"}, {"id": 463, "question": "「解体新書」の作成の中心となった人物を2人答えなさい。", "answer": "杉田玄白・前野良沢", "period": "江戸産業・学問"}, {"id": 464, "question": "江戸時代の学者であり、エレキテルを発明した人物はだれですか。", "answer": "平賀源内", "period": "江戸産業・学問"}, {"id": 465, "question": "江戸幕府の9代・10代将軍に仕えた老中で、積極的な商業政策を行った人物はだれですか。", "answer": "田沼意次", "period": "江戸産業・学問"}, {"id": 466, "question": "田沼意次が奨励した、商工業者の組合を何といいますか。", "answer": "株仲間", "period": "江戸産業・学問"}, {"id": 467, "question": "田沼意次が干拓工 日本とロシアとの間で1875年に結ばれ、千島列島を日本領、樺太をロシア領とした条約を何といいますか。", "answer": "樺太千島交換条約", "period": "明治外交・自由民権"}, {"id": 565, "question": "明治時代初期に政府内部で高まった、朝鮮を武力で開国させようとする主張を何といいますか。", "answer": "征韓論", "period": "明治外交・自由民権"}, {"id": 566, "question": "明治維新で活躍した、維新三傑とよばれる三人の人物を答えなさい。", "answer": "西郷隆盛・木戸孝允・大久保利通", "period": "明治外交・自由民権"}, {"id": 567, "question": "征韓論を主張したものの受け入れられず、1873年に政府を去った薩摩藩出身の人物はだれですか。", "answer": "西郷隆盛", "period": "明治外交・自由民権"}, {"id": 568, "question": "西郷隆盛を中心として1877年に鹿児島県で起こった士族の反乱を何といいますか。", "answer": "西南戦争", "period": "明治外交・自由民権"}, {"id": 569, "question": "西南戦争後、武力による反抗にかわって広がったのは、何による反抗ですか。", "answer": "言論による反抗", "period": "明治外交・自由民権"}, {"id": 570, "question": "征韓論が受け入れられなかったことを理由に政府を離れ、高知県に立志社を設立した、土佐藩出身の政治家はだれですか。", "answer": "板垣退助", "period": "明治外交・自由民権"}, {"id": 571, "question": "板垣退助らが1874年に提出した、国会開設を求める建白書を何といいますか。", "answer": "民撰議院設立建白書", "period": "明治外交・自由民権"}, {"id": 572, "question": "国会開設を求めて広まった運動を何といいますか。", "answer": "自由民権運動", "period": "明治外交・自由民権"}, {"id": 573, "question": "板垣退助を中心として、1881年に設立された政党を何といいますか。", "answer": "自由党", "period": "明治外交・自由民権"}, {"id": 574, "question": "東京専門学校を創立した、肥前藩出身の政治家はだれですか。", "answer": "大隈重信", "period": "明治外交・自由民権"}, {"id": 575, "question": "大隈重信を中心として、1882年に設立された政党を何といいますか。", "answer": "立憲改進党", "period": "明治外交・自由民権"}, {"id": 576, "question": "埼玉県の秩父地方で、1884年に起こった大規模な騒動を何といいますか。", "answer": "秩父事件", "period": "明治外交・自由民権"}, {"id": 577, "question": "条約改正のために、欧化政策を進めていた明治政府が、東京の日比谷に建設した洋館を何といいますか。", "answer": "鹿鳴館", "period": "明治外交・自由民権"}, {"id": 578, "question": "鹿鳴館を建設し、欧化政策に力を入れた外務大臣はだれですか。", "answer": "井上馨", "period": "明治外交・自由民権"}, {"id": 579, "question": "紀伊半島沖でイギリス船が沈没し、日本人乗客が見殺しにされた1886年の事件を何といいますか。", "answer": "ノルマントン号事件", "period": "明治外交・自由民権"}, {"id": 580, "question": "ノルマントン号事件をきっかけに高まった動きは何ですか。", "answer": "条約改正", "period": "明治外交・自由民権"}, {"id": 581, "question": "ノルマントン号事件で、人々が強く反発したのはなぜですか。", "answer": "船長を日本の法律で裁けなかったから", "period": "明治外交・自由民権"}, {"id": 582, "question": "それまでの太政官制度にかわり、1885年に定められた制度を何といいますか。", "answer": "内閣制度", "period": "明治外交・自由民権"}, {"id": 583, "question": "初代内閣総理大臣はだれですか。", "answer": "伊藤博文", "period": "明治外交・自由民権"}, {"id": 584, "question": "大日本帝国憲法が発布されたのはいつですか。", "answer": "1889年2月11日", "period": "明治外交・自由民権"}, {"id": 585, "question": "大日本帝国憲法が発布されたときの内閣総理大臣はだれですか。", "answer": "黒田清隆", "period": "明治外交・自由民権"}, {"id": 586, "question": "1890年に発布された、「忠君愛国」を教育の基本とする天皇のことばを何といいますか。", "answer": "教育勅語", "period": "明治外交・自由民権"}, {"id": 587, "question": "第1回衆議院議員総選挙は1890年に行われました。この時、選挙権を得るために必要だった直接国税はいくら以上ですか。", "answer": "15円以上", "period": "明治外交・自由民権"}, {"id": 588, "question": "第1回衆議院議員総選挙で選挙権を持っていたのは、満何歳以上の男子ですか。", "answer": "25歳以上", "period": "明治外交・自由民権"}, {"id": 589, "question": "第1回衆議院議員総選挙で、選挙権を持っていたのは、日本の総人口の何％でしたか。", "answer": "約1.1%", "period": "明治外交・自由民権"}, {"id": 590, "question": "第1回衆議院議員総選挙後に開かれた議会を何といいますか。", "answer": "帝国議会", "period": "明治外交・自由民権"}, {"id": 591, "question": "帝国議会で、国民の選挙で選ばれた議員で構成された議院を何といいますか。", "answer": "衆議院", "period": "明治外交・自由民権"}, {"id": 592, "question": "帝国議会で、皇族・華族・天皇が任命した議員などで構成された議院を何といいますか。", "answer": "貴族院", "period": "明治外交・自由民権"}, {"id": 593, "question": "1894年に、領事裁判権の撤廃に成功した外務大臣はだれですか。", "answer": "陸奥宗光", "period": "日清・日露"}, {"id": 594, "question": "朝鮮で1894年に起こった、大規模な農民の反乱を何といいますか。", "answer": "甲午農民戦争（東学党の乱）", "period": "日清・日露"}, {"id": 595, "question": "1894年に始まった、日本と清との戦争を何といいますか。", "answer": "日清戦争", "period": "日清・日露"}, {"id": 596, "question": "日清戦争後、1895年に日本と清との間で結ばれた講和条約を何といいますか。", "answer": "下関条約", "period": "日清・日露"}, {"id": 597, "question": "下関条約で日本が清から得たお金を何といいますか。", "answer": "賠償金", "period": "日清・日露"}, {"id": 598, "question": "下関条約で日本が清からゆずり受けた領土を2つ答えなさい。", "answer": "台湾・遼東半島", "period": "日清・日露"}, {"id": 599, "question": "ロシア・フランス・ドイツの圧力によって、日本が清に返還した領土はどこですか。", "answer": "遼東半島", "period": "日清・日露"}, {"id": 600, "question": "この出来事をなんといいますか", "answer": "三国干渉", "period": "日清・日露"}, {"id": 601, "question": "近代化を進めるため、ドイツの技術を導入して、政府が北九州につくった官営の製鉄所を何といいますか。", "answer": "八幡製鉄所", "period": "日清・日露"}, {"id": 602, "question": "八幡製鉄所は、何を主な資金源としてつくられましたか。", "answer": "日清戦争の賠償金", "period": "日清・日露"}, {"id": 603, "question": "明治時代に渡良瀬川流域で起こった、日本最初の本格的な公害事件を何といいますか。", "answer": "足尾銅山鉱毒事件", "period": "日清・日露"}, {"id": 604, "question": "足尾銅山鉱毒事件の解決に力をつくした人物はだれですか。", "answer": "田中正造", "period": "日清・日露"}, {"id": 605, "question": "ロシアの南下政策に対抗するために、1902年に日本が結んだ同盟を何といいますか。", "answer": "日英同盟", "period": "日清・日露"}, {"id": 606, "question": "日本とロシアとの間で、1904年に起こった戦争を何といいますか。", "answer": "日露戦争", "period": "日清・日露"}, {"id": 607, "question": "日本の連合艦隊がロシアのバルチック艦隊を破った海戦を何といいますか。", "answer": "日本海海戦", "period": "日清・日露"}, {"id": 608, "question": "日本海海戦で連合艦隊司令長官をつとめた人物はだれですか。", "answer": "東郷平八郎", "period": "日清・日露"}, {"id": 609, "question": "日露戦争のとき、「君死にたまふことなかれ」という詩を発表した女流歌人はだれですか。", "answer": "与謝野晶子", "period": "日清・日露"}, {"id": 610, "question": "日露戦争のとき、キリスト教徒としての立場から戦争に反対した人物はだれですか。", "answer": "内村鑑三", "period": "日清・日露"}, {"id": 611, "question": "日露戦争後、1905年に日本とロシアの間で結ばれた講和条約を何といいますか。", "answer": "ポーツマス条約", "period": "日清・日露"}, {"id": 612, "question": "ポーツマス条約の締結に協力したアメリカ大統領はだれですか。", "answer": "セオドア・ルーズベルト", "period": "日清・日露"}, {"id": 613, "question": "ポーツマス条約で日本が獲得した領土はどこですか。", "answer": "南樺太", "period": "日清・日露"}, {"id": 614, "question": "ポーツマス条約で日本がロシアからゆずり受けた鉄道は何ですか。", "answer": "南満州鉄道", "period": "日清・日露"}, {"id": 615, "question": "ポーツマス条約で賠償金を得られなかったことに反対して起きた事件を何といいますか。", "answer": "日比谷焼き打ち事件", "period": "日清・日露"}, {"id": 616, "question": "1909年に韓国統監の伊藤博文を暗殺した韓国人青年はだれですか。", "answer": "安重根(あん じゅうこん)", "period": "日清・日露"}, {"id": 617, "question": "韓国を、日本の植民地とした、1910年の出来事を何といいますか。", "answer": "韓国併合", "period": "日清・日露"}, {"id": 618, "question": "資本家と労働者の間の貧しさの差をなくし、平等で貧困のない社会を目指そうとする運動を何といいますか。", "answer": "社会主義運動", "period": "日清・日露"}, {"id": 619, "question": "ポーツマス条約のときの日本側全権をつとめ、1911年に関税自主権の回復に成功した外務大臣はだれですか。", "answer": "小村寿太郎", "period": "日清・日露"}, {"id": 620, "question": "明治時代の医学者で、ドイツのコッホのもとに留学し、ペスト菌や破傷風の治療法を発見した人物はだれですか。", "answer": "北里柴三郎", "period": "明治文化・大正"}, {"id": 621, "question": "北里柴三郎の助手として勤務したのち   const then=new Date(Number(m[1]), Number(m[2])-1, Number(m[3]));
  const now=new Date();
  const today=new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const diff=Math.max(0, Math.round((today-then)/86400000));
  if(diff===0) return '今日';
  if(diff===1) return '1日前';
  return `${diff}日前`;
}
function saveChapterState(){ localStorage.setItem(chapterKey,String(activeChapter)); localStorage.setItem(progressKey,String(current)); }

const protectedTerms = [
'日米修好通商条約','日米和親条約','領事裁判権','治外法権','関税自主権','尊王攘夷運動','安政のたい獄','安政の大獄','桜田門外の変','薩長同盟','大政奉還','王政復古の大号令','五箇条の御誓文','五榜の掲示','明治維新','文明開化','富国強兵','殖産興業','廃藩置県','地租改正','自由民権運動','民撰議院設立建白書','大日本帝国憲法','教育勅語','日清戦争','下関条約','三国干渉','日英同盟','日露戦争','ポーツマス条約','韓国併合','大正デモクラシー','第一次世界大戦','ベルサイユ条約','三・一独立運動','五・四運動','国際連盟','関東大震災','治安維持法','普通選挙法','世界恐慌','柳条湖事件','満州事変','リットン調査団','五・一五事件','二・二六事件','盧溝橋事件','日中戦争','国家総動員法','第二次世界大戦','日独伊三国同盟','太平洋戦争','ポツダム宣言','サンフランシスコ平和条約','日米安全保障条約','高度経済成長期','東海道新幹線','東京オリンピック','日中共同声明','日中平和 友好条約','部分的核実験禁止条約','核拡散防止条約','アジア・アフリカ会議',
'旧石器時代','縄文時代','弥生時代','古墳時代','飛鳥時代','奈良時代','平安時代','鎌倉時代','室町時代','安土桃山時代','江戸時代','明治時代','大正時代','昭和時代',

'九州地方','中国地方','東北地方','関東地方','瀬戸内海','朝鮮半島','北海道','沖縄県','広島市','長崎市','小田原城','横浜市','浦賀','函館','下田','長崎','新潟','神戸','横浜','薩摩藩','長州藩','土佐藩','対馬藩','紀伊藩','水戸藩','尾張藩'
].sort((a,b)=>b.length-a.length);

function escapeHtml(s){ return String(s).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function protectUnits(text){
  let parts=[]; let i=0;
  while(i<text.length){
    let hit='';
    for(const term of protectedTerms){ if(text.startsWith(term,i)){ hit=term; break; } }
    if(!hit){
      const m = text.slice(i).match(/^(\d{2,4}年|\d{1,2}月\d{1,2}日|\d+(?:\.\d+)?％|約\d+(?:\.\d+)?%|\d+(?:\.\d+)?%|[A-Z]+|GHQ|PKO|[ァ-ヴー・＝]{3,}|[一-龥々ヶ]{2,}(?:時代|地方|戦争|事件|条約|同盟|改革|運動|制度|法|令|藩|国|幕府|天皇|将軍|大臣|文化|貿易|会議|憲法|学校|神社|寺|遺跡|古墳|市|県|島|山|川|海|湾|半島|列島|街道|航路|大名|上皇|親王|王国)?)/);
      if(m) hit=m[0];
    }
    if(hit){ parts.push({t:hit,p:true}); i+=hit.length; }
    else { parts.push({t:text[i],p:false}); i++; }
  }
  return parts.map(p=>p.p?`<span class="noBreak">${escapeHtml(p.t)}</span>`:escapeHtml(p.t)).join('');
}
function fitText(){
  const el=$('mainText'), area=el.parentElement;
  const text=(showingAnswer && !previewingQuestion)? QUESTIONS[current].answer : QUESTIONS[current].question;
  const len=[...text].length;
  let max = showingAnswer && !previewingQuestion ? 54 : 46;
  if(!showingAnswer || previewingQuestion){
    if(len<=24) max=48; else if(len<=40) max=43; else if(len<=55) max=38; else max=33;
  } else {
    if(len<=8) max=64; else if(len<=18) max=52; else if(len<=35) max=42; else max=32;
  }
  let size=max;
  el.style.fontSize=size+'px';
  el.style.lineHeight = (showingAnswer && !previewingQuestion) ? '1.34' : '1.44';
  let guard=0;
  while(guard++<30 && size>22 && (el.scrollWidth>area.clientWidth || el.scrollHeight>area.clientHeight)){
    size-=1; el.style.fontSize=size+'px';
  }
}
function speak(text){
  if(!soundOn || !('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='ja-JP'; u.rate=.96; u.pitch=1;
  speechSynthesis.speak(u);
}
function render(opts={}){
  const q=QUESTIONS[current];
  const ch=activeCh();
  $('period').textContent=browseMode ? '確認モード' : ch.title;
  if(browseMode){
    $('qidPill').textContent=`#${String(ch.id).padStart(2,'0')}`;
    $('remainPill').textContent=`問題${q.id}`;
  } else {
    $('qidPill').textContent=`問題${q.id}`;
    $('remainPill').textContent=`残り${remainingCount()}問`;
  }
  const isAnswer = showingAnswer && !previewingQuestion;
  document.body.classList.toggle('previewMode', previewingQuestion);
  document.body.classList.toggle('browseMode', browseMode);
  $('label').textContent=isAnswer?'答え':'問題';
  $('label').classList.toggle('answerLabel', isAnswer);
  $('mainText').className='mainText '+(isAnswer?'answer':'');
  $('mainText').innerHTML=protectUnits(isAnswer?q.answer:q.question);
  $('answerBtn').classList.toggle('hidden', showingAnswer);
  $('holdQuestionBtn').classList.toggle('hidden', !showingAnswer);
  $('judgeGrid').classList.toggle('hidden', !showingAnswer || browseMode);
  updateStatsLine();
  requestAnimationFrame(fitText);
  if(!browseMode) saveChapterState();
  if(opts.speak) speak(isAnswer?q.answer:q.question);
}
function updateStatsLine(){
  // 学習中の表示は累計の○×ではなく、このチャプターの現在正解率。
  // 戻る／次への位置は変えず、右下の情報だけをポジティブな指標にする。
  let ok=0, ng=0;
  for(const key in sessionResults){
    if(sessionResults[key]==='ok') ok++;
    else if(sessionResults[key]==='ng') ng++;
  }
  const answered = ok + ng;
  const el = $('rateValue');
  el.className = 'rateValue';
  if(!answered){
    el.textContent='--%';
    el.classList.add('rate-none');
    return;
  }
  const rate = Math.round(ok / answered * 100);
  el.textContent = `${rate}%`;
  if(rate===100) el.classList.add('rate-red');
  else if(rate>=75) el.classList.add('rate-gold');
  else if(rate>=50) el.classList.add('rate-green');
  else el.classList.add('rate-cool');
}
function saveStats(){
  localStorage.setItem(statsKey,JSON.stringify(stats));
  localStorage.setItem(totalsKey,JSON.stringify(totals));
}
function showToast(t){const el=$('toast'); el.textContent=t; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),900);}
function completeChapter(){
  const ch=activeCh();
  const rec=chapterStats[ch.id] || {count:0,last:''};
  rec.count=Number(rec.count||0)+1;
  rec.last=todayISO();
  chapterStats[ch.id]=rec;
  saveChapterStats();
  showResult(ch);
}

const retryComments = [
  '今日は偵察任務完了。次は本番。',
  '一周しただけで、もう前進してる。',
  '苦手が見つかったのは収穫。',
  'ここから伸びるタイプかもしれない。',
  '問題の方が少し強かったね。',
  '歴史は覚えてないけど、始めたのは偉い。',
  '江戸幕府なら、まだ開幕前。',
  '徳川家康も最初から将軍ではなかった。',
  '今日は下見。次で取りに行こう。',
  'この結果は、まだ歴史になっていない。'
];
function getResultRank(rate){
  if(rate===100) return {cls:'rank-gold', stars:'★★★★★', medal:'ゴールドメダル', comment:'すばらしい！完璧です。'};
  if(rate>=75) return {cls:'rank-silver', stars:'★★★★☆', medal:'シルバーメダル', comment:'よくできました！'};
  if(rate>=50) return {cls:'rank-bronze', stars:'★★★☆☆', medal:'ブロンズメダル', comment:'あと少し！いい感じです。'};
  return {cls:'rank-retry', stars:'★★☆☆☆', medal:'再チャレンジ', comment:retryComments[Math.floor(Math.random()*retryComments.length)]};
}
function showResult(ch){
  const total=ch.count;
  let ok=0;
  for(let i=ch.startIndex;i<=ch.endIndex;i++){
    if(sessionResults[QUESTIONS[i].id]==='ok') ok++;
  }
  const rate= total ? Math.round(ok/total*100) : 0;
  const rank=getResultRank(rate);
  const box=$('resultBox');
  box.className='resultBox '+rank.cls;
  $('resultChapter').textContent=ch.title;
  $('resultTitle').textContent='結果';
  $('resultScore').textContent=`正解 ${ok} / ${total}　正答率 ${rate}%`;
  $('resultStars').textContent=rank.stars;
  $('resultMedal').textContent=rank.medal;
  $('resultComment').textContent=rank.comment;
  $('resultOverlay').classList.add('show');
  $('resultOverlay').setAttribute('aria-hidden','false');
}
function closeResult(){ $('resultOverlay').classList.remove('show'); $('resultOverlay').setAttribute('aria-hidden','true'); }

function next(){
  if(browseMode){
    const pos=browseIndices.indexOf(current);
    if(pos>=0 && browseIndices.length){ current=browseIndices[(pos+1)%browseIndices.length]; }
    else { current=(current+1)%QUESTIONS.length; }
    activeChapter=findChapterIndexByQuestion(current); showingAnswer=false; previewingQuestion=false; render({speak:true}); return;
  }
  const ch=activeCh();
  if(catchUpMode){
    const idx=firstUnansweredIndex();
    if(idx>=0){ current=idx; showingAnswer=false; previewingQuestion=false; render({speak:true}); return; }
  }
  if(current >= ch.endIndex){
    if(remainingCount()===0){ completeChapter(); }
    else { showIncompleteConfirm(); }
    return;
  }
  current++; showingAnswer=false; previewingQuestion=false; render({speak:true});
}
function prev(){
  if(browseMode){
    const pos=browseIndices.indexOf(current);
    if(pos>=0 && browseIndices.length){ current=browseIndices[(pos-1+browseIndices.length)%browseIndices.length]; }
    else { current=(current-1+QUESTIONS.length)%QUESTIONS.length; }
    activeChapter=findChapterIndexByQuestion(current); showingAnswer=false; previewingQuestion=false; render({speak:true}); return;
  }
  const ch=activeCh(); current = current<=ch.startIndex ? ch.endIndex : current-1; showingAnswer=false; previewingQuestion=false; render({speak:true}); }
$('answerBtn').addEventListener('click',()=>{showingAnswer=true; previewingQuestion=false; render({speak:true});});
$('correctBtn').addEventListener('click',()=>{const id=QUESTIONS[current].id; const s=stats[id]||{ok:0,ng:0}; s.ok=Number(s.ok||0)+1; s.ng=Number(s.ng||0); stats[id]=s; sessionAnswered.add(id); sessionResults[id]='ok'; totals.ok=Number(totals.ok||0)+1; totals.ng=Number(totals.ng||0); saveStats(); updateStatsLine(); showToast('正解を記録'); setTimeout(next,120);});
$('wrongBtn').addEventListener('click',()=>{const id=QUESTIONS[current].id; const s=stats[id]||{ok:0,ng:0}; s.ok=Number(s.ok||0); s.ng=Number(s.ng||0)+1; stats[id]=s; sessionAnswered.add(id); sessionResults[id]='ng'; totals.ok=Number(totals.ok||0); totals.ng=Number(totals.ng||0)+1; saveStats(); updateStatsLine(); showToast('不正解を記録'); setTimeout(next,120);});
$('nextBtn').addEventListener('click',next); $('prevBtn').addEventListener('click',prev);
$('soundBtn').addEventListener('click',()=>{soundOn=!soundOn; $('soundBtn').textContent=soundOn?'音声 ON':'音声 OFF'; if(!soundOn && 'speechSynthesis' in window) speechSynthesis.cancel(); else render({speak:true});});
function chapterCountClass(count){
  count = Number(count||0);
  if(count<=0) return 'count-zero';
  if(count<=2) return 'count-low';
  if(count<=5) return 'count-mid';
  if(count<=9) return 'count-high';
  return 'count-master';
}
function renderChapterMenu(){
  const grid=$('chapterGrid');
  grid.innerHTML=CHAPTERS.map((ch,i)=>{
    const rec=chapterStats[ch.id] || {count:0,last:''};
    const active=i===activeChapter ? ' active' : '';
    const num=String(ch.id).padStart(2,'0');
    return `<button type="button" class="chapterCard${active}" data-chapter="${i}" aria-label="チャプター${num} ${escapeHtml(ch.title)}">
      <div class="chapterTop"><div class="chapterNum">#${num}</div><div class="chapterInfo"><div class="chapterName">${escapeHtml(ch.title)}</div><div class="chapterRange">問題${ch.startId}〜${ch.endId}</div></div></div>
      <div class="chapterMeta"><span class="chapterCount ${chapterCountClass(rec.count)}">学習 ${Number(rec.count||0)}回</span><span class="chapterLast">${daysAgoLabel(rec.last)}</span></div>
    </button>`;
  }).join('');
}
function openChapterMenu(){ renderChapterMenu(); $('chapterMenu').classList.add('show'); $('chapterMenu').setAttribute('aria-hidden','false'); }
function requestMenu(){ if(browseMode){ openProblemBrowser(browseTitle || '問題一覧', browseIndices, browseSub); return; } if(sessionAnswered.size>0 && remainingCount()>0){ showIncompleteConfirm(); } else { openChapterMenu(); } }
function showIncompleteConfirm(){
  const left = remainingCount();
  $('confirmTitle').textContent = `あと${left}問残っているよ`;
  $('confirmText').textContent = `今回の学習はまだ完了していません。`;
  $('confirmText').style.display='none';
  $('confirmOverlay').classList.add('show');
  $('confirmOverlay').setAttribute('aria-hidden','false');
}
function closeIncompleteConfirm(){ $('confirmOverlay').classList.remove('show'); $('confirmOverlay').setAttribute('aria-hidden','true'); }
function closeChapterMenu(){ $('chapterMenu').classList.remove('show'); $('chapterMenu').setAttribute('aria-hidden','true'); }
function selectChapter(i){ browseMode=false; activeChapter=i; current=CHAPTERS[i].startIndex; showingAnswer=false; previewingQuestion=false; resetSession(); saveChapterState(); closeChapterMenu(); render({speak:true}); }


function chapterLabelForIndex(i){
  const ci = findChapterIndexByQuestion(i);
  const ch = CHAPTERS[ci] || activeCh();
  return {num:String(ch.id).padStart(2,'0'), title:ch.title};
}
function makeProblemItem(i){
  const q=QUESTIONS[i];
  const ch=chapterLabelForIndex(i);
  return `<button type="button" class="problemItem" data-index="${i}">
    <div class="problemMeta"><div class="problemChapterNo">#${ch.num}</div><div class="problemChapterName">${escapeHtml(ch.title)}</div></div>
    <div class="problemBody"><div class="problemTxt">${escapeHtml(q.question)}</div><div class="problemAns">答え：${escapeHtml(q.answer)}</div></div>
    <div class="problemId">${q.id}</div>
  </button>`;
}

function openProblemBrowser(title, indices, sub=''){
  browseIndices = Array.from(new Set(indices)).filter(i=>i>=0 && i<QUESTIONS.length);
  browseTitle = title;
  browseSub = sub || `${browseIndices.length}件`;
  $('browserTitle').textContent = title;
  $('browserSub').textContent = browseSub;
  const list=$('problemList');
  if(!browseIndices.length){ list.className='emptyList'; list.innerHTML='該当する問題がありません'; }
  else {
    list.className='problemList';
    list.innerHTML=browseIndices.map(i=>makeProblemItem(i)).join('');
  }
  $('browserOverlay').classList.add('show');
  $('browserOverlay').setAttribute('aria-hidden','false');
}
function closeProblemBrowser(){ $('browserOverlay').classList.remove('show'); $('browserOverlay').setAttribute('aria-hidden','true'); }
function openQuestionFromBrowser(index){
  browseMode=true;
  current=index;
  activeChapter=findChapterIndexByQuestion(index);
  showingAnswer=false; previewingQuestion=false;
  closeProblemBrowser(); closeChapterMenu(); closeIncompleteConfirm();
  render({speak:true});
}
function openChapterProblemList(chIndex){
  const ch=CHAPTERS[chIndex];
  const indices=[]; for(let i=ch.startIndex;i<=ch.endIndex;i++) indices.push(i);
  openProblemBrowser(`#${String(ch.id).padStart(2,'0')} ${ch.title}`, indices, `この章の問題　${indices.length}件`);
}
function normalizeSearch(s){ return String(s||'').trim().replace(/\s+/g,''); }
function keywordSearch(){
  const key=normalizeSearch($('keywordInput').value);
  if(!key){ showToast('検索語を入れてください'); return; }
  const indices=QUESTIONS.map((q,i)=>({q,i})).filter(({q})=> normalizeSearch(q.question).includes(key)||normalizeSearch(q.answer).includes(key)||normalizeSearch(q.period).includes(key)).map(x=>x.i);
  openProblemBrowser(`「${key}」を含む問題`, indices, `${indices.length}件ヒット`);
}
function yearSearch(){
  const indices=QUESTIONS.map((q,i)=>({q,i})).filter(({q})=> /\d{3,4}年/.test(q.question) || /\d{3,4}年/.test(q.answer)).map(x=>x.i);
  openProblemBrowser('年号を含む問題', indices, `${indices.length}件`);
}
function personSearch(){
  const indices=QUESTIONS.map((q,i)=>({q,i})).filter(({q})=> /誰|だれ|人物|天皇|将軍|大臣|上皇|皇子|皇后|藩主|商人|学者|作家|歌人|俳人|首相|大統領/.test(q.question)).map(x=>x.i);
  openProblemBrowser('人名に関する問題', indices, `${indices.length}件`);
}

  $('splashOverlay').classList.add('hide');

render();
